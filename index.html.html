<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>☢ RADIOAKTIV – Die Lernmission v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Space+Grotesk:wght@400;500;700&display=swap');

/* ===== DESIGN-SYSTEM ===== */
:root {
  --bg: #0d0f1a;
  --bg2: #141626;
  --bg3: #1c1f35;
  --card: #1e2138;
  --card2: #252843;
  --p: #6c63ff;
  --p2: #8b83ff;
  --pi: #ff4d8d;
  --ok: #00d4aa;
  --okd: #00b891;
  --wn: #ffb703;
  --wnd: #e6a500;
  --er: #ff4560;
  --xp: #ff9f1c;
  --tx: #e8eaf6;
  --tx2: #9aa0c4;
  --bd: rgba(108,99,255,0.18);
  --bd2: rgba(255,255,255,0.07);
  --glow: 0 0 20px rgba(108,99,255,0.3);
  --glow2: 0 0 30px rgba(108,99,255,0.5);
  --sh: 0 4px 24px rgba(0,0,0,0.4);
  --sm: 0 8px 40px rgba(0,0,0,0.5);
  --r: 18px;
  --rs: 12px;
  --rx: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Nunito', sans-serif; color: var(--tx); display: flex; flex-direction: column; }

/* ===== SCREENS ===== */
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; position: relative; }
.screen.active { display: flex; }
.sb { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }

/* ===== PARTICLES BACKGROUND ===== */
#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; border-radius: 50%; animation: float linear infinite; opacity: 0.15; }
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(255,77,141,0.1) 0%, transparent 50%),
              var(--bg);
  position: relative;
  z-index: 1;
}
.lc { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 2; }
.lcard {
  background: rgba(30,33,56,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bd);
  border-radius: var(--rx);
  padding: 36px 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--sm), inset 0 1px 0 rgba(255,255,255,0.08);
  text-align: center;
}
.logo-wrap { margin-bottom: 8px; }
.logo-icon { font-size: 52px; display: block; animation: pulse-glow 3s ease-in-out infinite; }
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(108,99,255,0.6)); transform: scale(1); }
  50% { filter: drop-shadow(0 0 20px rgba(108,99,255,0.9)); transform: scale(1.05); }
}
.logo {
  font-family: 'Fredoka One', cursive;
  font-size: 34px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #6c63ff, #ff4d8d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.logo-sub { color: var(--tx2); font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; margin-top: 4px; }

/* Tabs */
.tabrow { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg3); border-radius: var(--rs); padding: 4px; }
.tbtn {
  flex: 1; padding: 10px 6px;
  border: none; border-radius: 9px;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; color: var(--tx2);
  transition: all .25s;
}
.tbtn.active { background: var(--p); color: #fff; box-shadow: 0 2px 12px rgba(108,99,255,0.4); }

/* Inputs */
.ilbl { display: block; font-size: 12px; font-weight: 700; color: var(--tx2); margin-bottom: 6px; text-align: left; letter-spacing: 0.5px; }
.inp {
  width: 100%; padding: 14px 16px;
  border: 1.5px solid var(--bd);
  border-radius: var(--rs);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; outline: none;
  transition: all .2s;
  background: var(--bg3);
  color: var(--tx);
  margin-bottom: 12px;
}
.inp:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
.inp::placeholder { color: var(--tx2); }
.inpc { font-size: 11px; font-family: monospace; word-break: break-all; line-height: 1.6; }

/* Buttons */
.bbig {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--p), #9b59ff);
  color: #fff; border: none;
  border-radius: var(--rs);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 900;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  position: relative; overflow: hidden;
}
.bbig::after {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left .4s;
}
.bbig:active { transform: scale(0.98); }
.bbig:hover::after { left: 100%; }
.bok { background: linear-gradient(135deg, var(--ok), #00b891) !important; box-shadow: 0 4px 20px rgba(0,212,170,0.3) !important; }
.bdk { background: linear-gradient(135deg, #2d2d5e, #1a1a3e) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important; }
.lerr { color: var(--er); font-size: 12px; font-weight: 700; margin-bottom: 8px; min-height: 16px; }

/* ===== MAP SCREEN ===== */
#mapScreen { background: var(--bg); }
.ghdr {
  background: linear-gradient(135deg, rgba(108,99,255,0.95) 0%, rgba(155,89,255,0.95) 60%, rgba(255,77,141,0.85) 100%);
  backdrop-filter: blur(10px);
  padding: max(env(safe-area-inset-top,14px),14px) 20px 20px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.ghdr::before {
  content: '';
  position: absolute; top: -50%; left: -10%;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
  pointer-events: none;
}

/* Player header */
.mhi { display: flex; align-items: center; gap: 14px; }
.pav {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: 2.5px solid rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.pmt { flex: 1; min-width: 0; }
.pnm { font-weight: 900; font-size: 17px; color: #fff; }
.plv { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 700; margin-top: 1px; }
.xpw { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.xpb { flex: 1; height: 7px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
.xpf { height: 100%; background: var(--wn); border-radius: 4px; transition: width .6s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 0 8px rgba(255,183,3,0.6); }
.xpl { font-size: 11px; color: var(--wn); font-weight: 800; white-space: nowrap; }

/* Hearts */
.hrow { display: flex; gap: 4px; margin-top: 2px; }
.hrt { font-size: 16px; transition: all .3s; }
.hrt.empty { opacity: 0.25; filter: grayscale(1); }

/* Badges strip */
.bstr { padding: 16px 16px 0; }
.btit { font-size: 10px; font-weight: 800; color: var(--tx2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
.brow { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.brow::-webkit-scrollbar { display: none; }
.bi { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; width: 56px; }
.bic {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--bg3);
  border: 1.5px solid var(--bd2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  filter: grayscale(1); opacity: 0.4;
  transition: all .3s;
}
.bic.ea {
  filter: none; opacity: 1;
  border-color: var(--wn);
  box-shadow: 0 0 12px rgba(255,183,3,0.4);
  animation: badge-glow 2s ease-in-out infinite;
}
@keyframes badge-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(255,183,3,0.3); }
  50% { box-shadow: 0 0 18px rgba(255,183,3,0.6); }
}
.bnm { font-size: 9px; font-weight: 700; color: var(--tx2); text-align: center; line-height: 1.2; }

/* Topic cards */
.stit {
  font-size: 10px; font-weight: 800;
  color: var(--tx2); letter-spacing: 2px;
  text-transform: uppercase;
  margin: 20px 0 10px; padding-left: 4px;
}
.stit.bon { color: var(--xp); }

.tc {
  background: var(--card);
  border-radius: var(--r);
  padding: 16px 16px;
  box-shadow: var(--sh);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all .2s;
  border: 1.5px solid var(--bd2);
  position: relative;
  overflow: hidden;
}
.tc::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
  pointer-events: none;
}
.tc:active { transform: scale(0.98); }
.tc.cur { border-color: var(--p); box-shadow: 0 4px 20px rgba(108,99,255,0.2); }
.tc.cur::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--p);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 8px var(--p);
}
.tc.dn { border-color: rgba(0,212,170,0.3); background: linear-gradient(135deg, rgba(0,212,170,0.05), var(--card)); }
.tc.lk { opacity: 0.4; cursor: not-allowed; }
.tc.bon { border-color: rgba(255,183,3,0.25); background: linear-gradient(135deg, rgba(255,183,3,0.05), var(--card)); }

.tic {
  width: 52px; height: 52px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.ib { background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(108,99,255,0.1)); }
.ig { background: linear-gradient(135deg, rgba(0,212,170,0.25), rgba(0,212,170,0.1)); }
.io { background: linear-gradient(135deg, rgba(255,183,3,0.25), rgba(255,183,3,0.1)); }
.ip { background: linear-gradient(135deg, rgba(255,77,141,0.25), rgba(255,77,141,0.1)); }
.iv { background: linear-gradient(135deg, rgba(155,89,255,0.25), rgba(155,89,255,0.1)); }
.ir { background: linear-gradient(135deg, rgba(255,69,96,0.25), rgba(255,69,96,0.1)); }

.ti { flex: 1; min-width: 0; }
.tt { font-weight: 800; font-size: 15px; margin-bottom: 3px; color: var(--tx); }
.td { font-size: 12px; color: var(--tx2); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tm { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tg { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; }
.gx { background: rgba(255,183,3,0.15); color: var(--wn); }
.gq { background: rgba(108,99,255,0.15); color: var(--p2); }
.gd { background: rgba(0,212,170,0.15); color: var(--ok); }
.gl { background: rgba(255,255,255,0.07); color: var(--tx2); }
.gb { background: rgba(255,183,3,0.1); color: var(--xp); }
.tch { font-size: 22px; flex-shrink: 0; }

/* Fab button */
.fab {
  position: absolute; bottom: calc(env(safe-area-inset-bottom, 16px) + 16px); right: 20px;
  background: linear-gradient(135deg, #2d2d5e, #1e1e45);
  color: var(--tx2); border: 1.5px solid var(--bd);
  border-radius: 50px; padding: 10px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; z-index: 100;
  box-shadow: var(--sh);
  transition: all .2s;
}
.fab:active { transform: scale(0.95); }
.fab-pdf {
  position: absolute; bottom: calc(env(safe-area-inset-bottom, 16px) + 16px); left: 20px;
  background: linear-gradient(135deg, #004d3d, #006b52);
  color: #00d4aa; border: 1.5px solid rgba(0,212,170,0.3);
  border-radius: 50px; padding: 10px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; z-index: 100;
  box-shadow: var(--sh);
  transition: all .2s;
}
.fab-pdf:active { transform: scale(0.95); }

/* ===== TOPIC SCREEN ===== */
#topicScreen { background: var(--bg); }
.thi { display: flex; align-items: center; gap: 12px; }
.bb {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(255,255,255,0.15);
  border: none; color: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}
.bb:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
.tht { flex: 1; min-width: 0; }
.tht h2 { font-size: 16px; font-weight: 900; color: #fff; line-height: 1.2; }
.tht p { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; margin-top: 2px; }

/* Progress bar */
.tpb { height: 4px; background: rgba(255,255,255,0.15); margin-top: 14px; border-radius: 2px; overflow: hidden; }
.tpf { height: 100%; background: var(--wn); border-radius: 2px; transition: width .5s; box-shadow: 0 0 8px rgba(255,183,3,0.5); }

/* Phase tabs */
.ptabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--bd2); flex-shrink: 0; }
.pt {
  flex: 1; padding: 14px 8px;
  border: none; background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  color: var(--tx2); cursor: pointer;
  transition: all .2s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.pt.active { color: var(--p); border-bottom-color: var(--p); }

/* ===== TEXT/SIM PHASE ===== */
/* Historical briefing */
.hist-card {
  background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(108,99,255,0.05));
  border: 1.5px solid rgba(108,99,255,0.25);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.hist-card::before {
  content: '🕰️';
  position: absolute; top: -5px; right: -5px;
  font-size: 50px; opacity: 0.12;
  transform: rotate(15deg);
}
.hist-year { font-size: 11px; font-weight: 800; color: var(--p2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.hist-text { font-size: 14px; font-weight: 600; color: var(--tx); line-height: 1.6; font-style: italic; }

/* Scenario card */
.scene-card {
  background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,212,170,0.04));
  border: 1.5px solid rgba(0,212,170,0.2);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.scene-card::before {
  content: attr(data-icon);
  position: absolute; top: -5px; right: -5px;
  font-size: 50px; opacity: 0.12;
  transform: rotate(-5deg);
}
.scene-role { font-size: 11px; font-weight: 800; color: var(--ok); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.scene-text { font-size: 14px; font-weight: 600; color: var(--tx); line-height: 1.6; }

/* Text variants */
.lbtnrow { display: flex; gap: 6px; margin-bottom: 14px; }
.lbtn {
  flex: 1; padding: 10px 8px;
  border: 1.5px solid var(--bd);
  border-radius: var(--rs);
  background: var(--bg3);
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; color: var(--tx2);
  transition: all .2s;
}
.lbtn.active { border-color: var(--p); background: rgba(108,99,255,0.15); color: var(--p2); }

/* Text content */
.txt-block {
  background: var(--card);
  border-radius: var(--r);
  padding: 20px;
  border: 1.5px solid var(--bd2);
  margin-bottom: 14px;
}
.txt-block h3 { font-size: 16px; font-weight: 900; color: var(--tx); margin-bottom: 12px; }
.txt-block p { font-size: 14px; font-weight: 600; color: var(--tx); line-height: 1.7; margin-bottom: 10px; }
.txt-block p:last-child { margin-bottom: 0; }
.txt-block strong { color: var(--p2); }
.txt-highlight {
  background: rgba(108,99,255,0.1);
  border-left: 3px solid var(--p);
  padding: 12px 14px;
  border-radius: 0 var(--rs) var(--rs) 0;
  margin: 12px 0;
  font-size: 14px; font-weight: 700;
  color: var(--tx); line-height: 1.5;
  font-style: italic;
}
.txt-table {
  width: 100%; border-collapse: collapse;
  margin: 12px 0; font-size: 12px;
}
.txt-table th { background: rgba(108,99,255,0.2); color: var(--p2); font-weight: 800; padding: 8px 10px; text-align: left; }
.txt-table td { padding: 8px 10px; border-bottom: 1px solid var(--bd2); color: var(--tx); font-weight: 600; }
.txt-table tr:last-child td { border-bottom: none; }

/* Sim container */
.sc { background: var(--card); border-radius: var(--r); padding: 18px; border: 1.5px solid var(--bd2); margin-bottom: 14px; }
.sc h3 { font-size: 15px; font-weight: 900; margin-bottom: 14px; color: var(--tx); }
.sr { margin-top: 12px; padding: 12px 14px; border-radius: var(--rs); background: var(--bg3); font-size: 13px; font-weight: 700; border: 1.5px solid var(--bd2); line-height: 1.5; color: var(--tx2); }
input[type=range] { flex: 1; -webkit-appearance: none; height: 6px; background: var(--bg3); border-radius: 3px; outline: none; border: 1.5px solid var(--bd); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--p); border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(108,99,255,0.5); }
.cr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.cl { font-size: 12px; font-weight: 700; color: var(--tx2); min-width: 90px; }
.cv { font-weight: 800; color: var(--p2); min-width: 55px; font-size: 13px; text-align: right; }
.sbtn { padding: 9px 16px; border: 1.5px solid var(--bd); border-radius: 20px; background: var(--bg3); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; color: var(--tx2); transition: all .2s; }
.sbtn.active, .sbtn:active { border-color: var(--p); background: rgba(108,99,255,0.2); color: var(--p2); }
.bph { text-align: center; padding: 40px 20px; }
.bph h3 { font-size: 18px; font-weight: 900; margin-bottom: 10px; color: var(--tx); }
.bph p { font-size: 14px; color: var(--tx2); margin-bottom: 8px; }
.bpr { display: inline-block; background: rgba(108,99,255,0.15); border: 1px solid var(--bd); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--p2); margin-top: 8px; }

/* Weiter buttons */
.btn-weiter {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--p), #9b59ff);
  color: #fff; border: none; border-radius: var(--rs);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 900;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  transition: all .2s;
}
.btn-weiter:active { transform: scale(0.98); }

/* ===== QUIZ PHASE ===== */
.qhdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.qpg { font-size: 12px; font-weight: 800; color: var(--tx2); }
.qsc { font-size: 12px; font-weight: 800; color: var(--p2); }
.hq { display: flex; gap: 3px; }
.hrt-q { font-size: 14px; transition: all .3s; }
.hrt-q.lost { opacity: 0.2; filter: grayscale(1); animation: shake .3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* Progress */
.qprog { height: 5px; background: var(--bg3); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.qprog-f { height: 100%; background: linear-gradient(90deg, var(--p), var(--pi)); border-radius: 3px; transition: width .4s; }

<script>

// ===== THEMEN =====

  {id:'atom',        t:'Atomaufbau',               ic:'⚛️',  cl:'ib', d:'Protonen, Neutronen, Isotope', xp:60,  bdg:'at', bon:false, prev:null},

      // Sunflower packing, returns unit-scale positions (max r=1)
      function nucleusPositions(total){
        const pos=[];
        if(total===0) return pos;
        const phi=Math.PI*(3-Math.sqrt(5));
        for(let i=0;i<total;i++){
          const r=Math.sqrt(i/Math.max(1,total-0.5));
          pos.push([r*Math.cos(i*phi), r*Math.sin(i*phi)]);
        }
        return pos;
      }

      function drawNucleus(ctx, cx, cy, z, n, nucR){
        const total=z+n;
        if(total===0) return;
        const pos=nucleusPositions(total);
        const ballR=Math.max(2.5, Math.min(nucR*0.92, nucR/(Math.sqrt(total)*0.72)));

        // Even interleaving of protons/neutrons, then LCG Fisher-Yates shuffle
        const types=[];
        for(let i=0;i<total;i++){
          const pSoFar=types.filter(t=>t===0).length;
          types.push(pSoFar/Math.max(1,i)<=z/total && pSoFar<z ? 0 : 1);
        }
        let seed=z*31+n*17;
        function lcg(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;}
        for(let i=types.length-1;i>0;i--){
          const j=Math.floor(lcg()*(i+1));
          [types[i],types[j]]=[types[j],types[i]];

        // Shadows first
        pos.forEach(([px,py])=>{
          const x=cx+px*nucR, y=cy+py*nucR;
          ctx.beginPath();ctx.arc(x+1,y+1.5,ballR,0,Math.PI*2);

        [...pos.keys()].sort((a,b)=>pos[a][1]-pos[b][1]).forEach(i=>{
          const [px,py]=pos[i];
          const x=cx+px*nucR, y=cy+py*nucR;
          const isP=types[i]===0;
          const c1=isP?'#f1948a':'#dfe6e9';
          const c2=isP?'#c0392b':'#95a5a6';
          const gr=ctx.createRadialGradient(x-ballR*0.32,y-ballR*0.36,ballR*0.04,x,y,ballR);
          gr.addColorStop(0,c1); gr.addColorStop(1,c2);
          ctx.beginPath();ctx.arc(x,y,ballR,0,Math.PI*2);
          ctx.fillStyle=gr;ctx.fill();
          ctx.beginPath();ctx.arc(x-ballR*0.3,y-ballR*0.32,ballR*0.26,0,Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
        });
      }

      function draw(){

        ctx.clearRect(0,0,W,H);
        const shells=getShells(Z);
        const nShells=shells.length;

        // === PROPORTIONS ===
        // Nucleus: grows slowly with cbrt(A), capped so it's always << first orbit
        // At H (A=1): nucR=6px. At Fe (A=56): ~16px. At U (A=238): ~22px.
        const A=Z+N;
        const nucR=Math.max(6, Math.min(22, 5.5*Math.cbrt(A)));

        // Electron shells: fill available canvas space independently of nucleus
        // innermost shell starts well outside nucleus, outermost fits canvas

        const maxR=Math.min(cx,cy)-margin;
        const firstR=Math.max(nucR+24, maxR*0.28);  // 1st shell: at least 24px gap from nucleus
        const shellGap=nShells>1 ? (maxR-firstR)/(nShells-1) : 0;
        const radii=shells.map((_,i)=>firstR+i*shellGap);

        // Draw orbits
        radii.forEach(r=>{
          ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
          ctx.strokeStyle='rgba(108,99,255,0.18)';ctx.lineWidth=1;ctx.stroke();
          // shell label (K, L, M…)
          ctx.fillStyle='rgba(108,99,255,0.4)';
          ctx.font='bold 9px Nunito';ctx.textAlign='left';ctx.textBaseline='middle';
          ctx.fillText('KLMNO'[radii.indexOf(r)], cx+r+3, cy);
        });

        // Draw nucleus
        drawNucleus(ctx,cx,cy,Z,N,nucR);

        // Isotope notation: ᴬZ sym — A top-left, Z bottom-left of nucleus
        const sym=getSym(Z);
        const nucA=Z+N;
        const notX=cx-nucR-2;
        const notY=cy;
        ctx.textAlign='right'; ctx.textBaseline='middle';
        // A (top)
        ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 10px Nunito';
        ctx.fillText(nucA, notX, notY-7);
        // Z (bottom)
        ctx.fillStyle='rgba(200,200,255,0.75)'; ctx.font='bold 9px Nunito';

        ctx.textAlign='left';
        ctx.fillText(sym, cx+nucR+3, notY);

        // Draw electrons
        shells.forEach((count,si)=>{
          const r=radii[si];
          const speed=0.65-si*0.1;

            const angle=(e/count)*Math.PI*2+t*speed;

            eg.addColorStop(0,'#a29bfe');eg.addColorStop(1,'#6c63ff');
            ctx.fillStyle=eg;ctx.fill();

        const conf=shells.map((n,i)=>`${'KLMN'[i]}:${n}`).join(' ');
        const elN=document.getElementById('aConf'); if(elN) elN.textContent=conf;
        animId=requestAnimationFrame(draw);

      window._zDraw=function(){
        const vals=getVals();
        const N0=vals[0]||1;
        const cv=document.getElementById('zCanvas'); if(!cv)return;
        const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
        ctx.clearRect(0,0,W,H);
        // Axes
        ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(36,8);ctx.lineTo(36,H-22);ctx.lineTo(W-8,H-22);ctx.stroke();
        // Theoretical curve
        const n=Math.max(vals.length,8);
        ctx.beginPath();ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,183,3,0.5)';ctx.lineWidth=1.5;
        for(let i=0;i<=n;i++){
          const x=36+(i/n)*(W-46);
          const y=(H-22)-(Math.pow(5/6,i))*(H-34);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();ctx.setLineDash([]);
        // Measured curve
        if(vals.length>1){
          ctx.beginPath();ctx.strokeStyle='#6c63ff';ctx.lineWidth=2.5;
          vals.forEach((v,i)=>{
            const x=36+(i/(Math.max(vals.length-1,1)))*(W-46);
            const y=(H-22)-(v/N0)*(H-34);
            i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
          });
          ctx.stroke();
          // Dots
          vals.forEach((v,i)=>{
            const x=36+(i/(Math.max(vals.length-1,1)))*(W-46);
            const y=(H-22)-(v/N0)*(H-34);
            ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
            ctx.fillStyle='#6c63ff';ctx.fill();
          });
        }
        // Half-line
        ctx.beginPath();ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(239,35,60,0.4)';ctx.lineWidth=1;
        const hy=(H-22)-(0.5)*(H-34);
        ctx.moveTo(36,hy);ctx.lineTo(W-8,hy);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='rgba(239,35,60,0.6)';ctx.font='9px Nunito';ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText('½·N₀',38,hy-7);
        // Labels
        ctx.fillStyle='var(--tx2)';ctx.font='10px Nunito';ctx.textAlign='center';ctx.textBaseline='alphabetic';
        ctx.fillText('Runde',W/2,H-4);
        ctx.save();ctx.translate(12,(H-22)/2);ctx.rotate(-Math.PI/2);ctx.fillText('Würfel',0,0);ctx.restore();
        // Legend
        ctx.font='9px Nunito';ctx.textAlign='left';
        ctx.fillStyle='rgba(255,183,3,0.8)';ctx.fillText('— Theorie',W-72,18);
        ctx.fillStyle='#6c63ff';ctx.fillText('— Messung',W-72,30);
        // Auswertung: experimentelle HWZ
        const half=N0/2;
        let hwzRound=null;
        for(let i=1;i<vals.length;i++){if(vals[i]<=half&&hwzRound===null)hwzRound=i+(vals[i-1]-half)/(vals[i-1]-vals[i+1]||1)*0.5;}
        const hwzEl=document.getElementById('zHwz');
        if(hwzEl){
          if(hwzRound!==null) hwzEl.innerHTML=`📐 Deine experimentelle Halbwertszeit: ca. <strong>${hwzRound.toFixed(1)} Runden</strong> (Theorie: 3,8 Runden)`;
          else if(vals.length>2) hwzEl.textContent='Noch nicht genug Daten – trage mehr Runden ein.';
          else hwzEl.textContent='';
        }
      };

      window._zAddRound=function(){
        const grid=document.getElementById('zRounds'); if(!grid)return;
        const idx=document.querySelectorAll('.zRInput').length+1;
        const div=document.createElement('div');
        div.style.cssText='display:grid;grid-template-columns:auto 1fr auto;gap:6px 10px;align-items:center;margin-bottom:6px';
        div.innerHTML=`<div style="font-size:11px;font-weight:800;color:var(--tx2)">Runde ${idx}</div>
          <input type="number" class="zRInput" min="0" max="200" placeholder="Würfel" oninput="_zDraw()"
            style="width:80px;padding:6px 10px;border:2px solid var(--bd);border-radius:8px;background:var(--bg3);color:var(--tx);font-family:Nunito;font-size:14px;font-weight:700">
          <button onclick="this.parentElement.remove();_zDraw()" style="background:none;border:none;color:var(--tx2);font-size:16px;cursor:pointer;padding:4px">✕</button>`;
        grid.appendChild(div);
        _zDraw();
      };

      window._zReset=function(){
        document.getElementById('zRounds').innerHTML='';
        const r0=document.getElementById('zR0'); if(r0)r0.value=60;
        _zDraw();
      };

      // Start with 4 blank rounds ready
      for(let i=0;i<4;i++) _zAddRound();
      _zDraw();
    }
  },

  kernfusion:{

      function drawFusion(ctx,W,H){
        ctx.clearRect(0,0,W,H);
        const cx=W/2,cy=H/2;
        const bounce=Math.sin(t*3)*5;
        // D nucleus (left)
        ctx.beginPath();ctx.arc(cx-50+Math.sin(t)*10,cy,14,0,Math.PI*2);
        const gD=ctx.createRadialGradient(cx-50,cy,0,cx-50,cy,14);

        ctx.fillStyle='#fff';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('D',cx-50+Math.sin(t)*10,cy);
        // T nucleus (right)
        ctx.beginPath();ctx.arc(cx+50-Math.sin(t)*10,cy,16,0,Math.PI*2);
        const gT=ctx.createRadialGradient(cx+50,cy,0,cx+50,cy,16);
        gT.addColorStop(0,'rgba(255,77,141,0.9)');gT.addColorStop(1,'rgba(255,77,141,0.4)');

        ctx.fillText('³H',cx+50-Math.sin(t)*10,cy+24);
        // Arrow
        if(Math.abs(Math.sin(t))<0.3){
          ctx.beginPath();ctx.moveTo(cx-15,cy);ctx.lineTo(cx+15,cy);
          ctx.strokeStyle='rgba(255,183,3,0.8)';ctx.lineWidth=2;ctx.stroke();
          ctx.fillStyle='#ffb703';ctx.font='bold 9px Nunito';ctx.textAlign='center';ctx.fillText('→Fusion!←',cx,cy-20);

          ctx.fillStyle='#fff';ctx.font='bold 8px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('He',cx-20,cy-35);
          ctx.beginPath();ctx.arc(cx+20,cy+35,7,0,Math.PI*2);
          ctx.fillStyle='rgba(255,183,3,0.7)';ctx.fill();ctx.fillText('n',cx+20,cy+35);
          ctx.textBaseline='alphabetic';ctx.fillStyle='#00d4aa';ctx.font='bold 9px Nunito';ctx.textAlign='center';
          ctx.fillText('+17,6 MeV ⚡',cx,cy+60);
        }
        t+=0.05;
      }
      function drawTokamak(ctx,W,H){
        ctx.clearRect(0,0,W,H);
        const cx=W/2,cy=H/2;
        // Torus
        for(let a=0;a<Math.PI*2;a+=0.05){
          const r=55,pr=20;
          const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a)*0.5;
          ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);
          ctx.fillStyle=`rgba(30,40,80,0.5)`;ctx.fill();
          ctx.strokeStyle='rgba(108,99,255,0.2)';ctx.lineWidth=1;ctx.stroke();
        }
        // Plasma
        for(let a=0;a<Math.PI*2;a+=0.15){
          const r=55,pr=12;
          const x=cx+r*Math.cos(a+t),y=cy+r*Math.sin(a+t)*0.5;
          const hue=Math.floor((a/Math.PI/2)*60+200);
          ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);
          ctx.fillStyle=`hsla(${hue},100%,60%,0.6)`;ctx.fill();
        }
        ctx.fillStyle='#fff';ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('🔵 Plasma',cx,cy);ctx.fillText('~100 Mio. °C',cx,cy+16);
        ctx.textBaseline='alphabetic';
        ctx.fillStyle='var(--tx2)';ctx.font='9px Nunito';
        ctx.fillText('Magnetfeld hält Plasma in Schwebe',cx,H-5);
        t+=0.03;
      }
      function animate(){
        const cv=document.getElementById('kC');if(!cv){return;}
        const ctx=cv.getContext('2d');
        if(mode==='fusion')drawFusion(ctx,cv.width,cv.height);
        else drawTokamak(ctx,cv.width,cv.height);
        animId=requestAnimationFrame(animate);
      }
      window._kMode=function(s){mode=s;
        ['fusion','tokamak'].forEach(k=>document.getElementById('km_'+k).classList.toggle('active',k===s));
        document.getElementById('kInfo').textContent=s==='fusion'?'D+T → He-4 + n + 17,6 MeV. Die energiereichste kontrollierte Kernreaktion.':'Tokamak: Ringförmige Kammer. Magnetfelder halten das 100-Mio.-Grad-Plasma eingeschlossen.';
      };
      document.getElementById('kInfo').textContent='D+T → He-4 + n + 17,6 MeV. Die energiereichste kontrollierte Kernreaktion.';
      animate();
    }
  },

        ctx.clearRect(0,0,W,H);

        // X-ray beam
        for(let i=-1;i<=1;i++){

          ctx.strokeStyle='rgba(0,212,170,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();
          ctx.setLineDash([]);
        }
        ctx.fillStyle='rgba(0,212,170,0.7)';ctx.font='9px Nunito';ctx.textAlign='center';ctx.fillText('Röntgen',130,H/2-18);

        // Object
        ctx.fillStyle=mat.col==='#222'?'rgba(50,50,80,0.8)':mat.col==='#fff'?'rgba(200,200,220,0.9)':'rgba(120,120,140,0.8)';

        ctx.fillStyle='#fff';ctx.font='8px Nunito';ctx.textAlign='center';ctx.fillText(mat.name.split('(')[0].trim(),170,H/2+32);

        // Transmitted beam
        const alpha=trans;
        ctx.beginPath();ctx.moveTo(180,H/2);ctx.lineTo(W-20,H/2);

        document.getElementById('xInfo').innerHTML=`<strong>${mat.name}</strong> bei ${kV} kV: ${Math.round((1-trans)*100)}% absorbiert → Detektor zeigt ${mat.col==='#e8e8e8'?'hellen':mat.col==='#222'?'dunklen':'grauen'} Bereich. ${mat.info}`;
      }
      window._xMat=function(s){selMat=s;Object.keys(MATS).forEach(k=>document.getElementById('xm_'+k).classList.toggle('active',k===s));xUpd();};

        for(let i=0;i<8;i++){

        <div style="margin-top:8px;font-size:12px;font-weight:700;color:var(--tx2);line-height:1.7;padding:8px 10px;background:var(--bg3);border-radius:8px" id="gPhaseInfo">
          ① Ein radioaktives Teilchen tritt durch das <strong style="color:#00d4aa">Glimmerfenster</strong> ein und ionisiert <strong style="color:rgba(108,99,255,0.9)">Argonatome</strong>.
        </div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="sbtn active" onclick="_gmFire()">⚡ Teilchen einschießen</button>
          <button class="sbtn" onclick="_gmAutoToggle()" id="gAutoBtn">▶ Auto</button>
          <button class="sbtn" onclick="_gmSlowToggle()" id="gSlowBtn" style="border-color:rgba(0,212,170,0.4);color:#00d4aa">🐢 Zeitlupe</button>
        </div>
      </div>

      <!-- DISTANCE MODE -->
      <div id="gDistPanel" style="display:none">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
          <div style="font-size:11px;font-weight:800;color:var(--tx2);min-width:70px">Abstand r</div>
          <input type="range" min="1" max="20" value="3" id="gR" oninput="_gmDist()" style="flex:1">
          <div style="font-size:13px;font-weight:900;color:#ff4d8d;min-width:45px" id="gRv">3 cm</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <div style="font-size:11px;font-weight:800;color:var(--tx2);min-width:70px">Aktivität A₀</div>
          <input type="range" min="100" max="2000" value="500" step="100" id="gA0" oninput="_gmDist()" style="flex:1">
          <div style="font-size:13px;font-weight:900;color:#ffb703;min-width:55px" id="gA0v">500</div>
        </div>
        <canvas id="gDistCanvas" width="320" height="150" style="width:100%;border-radius:var(--rs);background:var(--bg);display:block"></canvas>
        <div class="sr" style="margin-top:8px" id="gDistInfo"></div>
        <div style="margin-top:6px;font-size:11px;color:var(--tx2);font-weight:700;text-align:center">💡 Doppelter Abstand → vierfach geringere Intensität (I ~ 1/r²)</div>
      </div>`;

      // ---- TUBE SIMULATION ----
      const COLORS = {ray:'#ff4560', electron:'#6c63ff', ion:'#ffb703', spark:'#fff', wire:'#ffb703', cathode:'#aab0c0', gas:'rgba(108,99,255,0.07)', window:'#00d4aa'};
      let autoMode=false, autoTimer=null, phase=0, phaseTimer=null, slowMode=false;
      const PHASES=[
        '① Ein radioaktives Teilchen tritt durch das <strong style="color:#00d4aa">Glimmerfenster</strong> ein und ionisiert <strong style="color:rgba(108,99,255,0.9)">Argonatome</strong>.',
        '② Das elektrische Feld (Spannung: <strong style="color:#ffb703">'+voltage+' V</strong>) beschleunigt die freien <strong style="color:#6c63ff">Elektronen</strong> zum Anodendraht.',
        '③ Die Elektronen ionisieren weitere Atome → <strong style="color:#6c63ff">Elektronenlawine</strong> (Townsend-Lawine)!',
        '④ Die Lawine erzeugt einen <strong style="color:#ff4560">Stromimpuls</strong> → Zählgerät registriert: <strong style="color:#ff4560">KLICK! 🔊</strong>',
      ];

      function drawTube(ctx, W, H, ps) {
        ctx.clearRect(0,0,W,H);
        const TY=H/2, TH=60, TX=40, TW=W-80;

        // Kathode (Außenrohr)
        ctx.strokeStyle=COLORS.cathode; ctx.lineWidth=3;
        ctx.beginPath(); ctx.roundRect(TX,TY-TH/2,TW,TH,6); ctx.stroke();
        // Gas-Füllung
        ctx.fillStyle=COLORS.gas;
        ctx.beginPath(); ctx.roundRect(TX+2,TY-TH/2+2,TW-4,TH-4,5); ctx.fill();
        // Glimmerfenster
        ctx.fillStyle=COLORS.window; ctx.globalAlpha=0.8;
        ctx.fillRect(TX-2,TY-TH/2+6,8,TH-12); ctx.globalAlpha=1;
        // Anodendraht
        ctx.strokeStyle=COLORS.wire; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(TX+8,TY); ctx.lineTo(TX+TW-4,TY); ctx.stroke();
        // Draht-Endknoten
        ctx.beginPath(); ctx.arc(TX+TW-4,TY,5,0,Math.PI*2); ctx.fillStyle=COLORS.wire; ctx.fill();
        // HV-Anschluss rechts
        ctx.fillStyle='rgba(30,33,56,0.9)';
        ctx.fillRect(TX+TW+2,TY-14,28,28); ctx.strokeStyle='#ffb703'; ctx.lineWidth=1.5;
        ctx.strokeRect(TX+TW+2,TY-14,28,28);
        ctx.fillStyle='#ffb703'; ctx.font='bold 8px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('HV',TX+TW+16,TY);

        // Labels Kathode
        ctx.fillStyle=COLORS.cathode; ctx.font='8px Nunito'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('Kathode (−)',TX+TW/2,TY-TH/2-2);
        // Label Anode
        ctx.fillStyle=COLORS.wire; ctx.textBaseline='top';
        ctx.fillText('Anodendraht (+)',TX+TW/2,TY+TH/2+2);
        // Label Fenster
        ctx.fillStyle=COLORS.window; ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText('Glimmerfenster',TX+10,TY-TH/2-10);

        // Source radioactive
        const srcX=TX-22, srcY=TY;
        const sg=ctx.createRadialGradient(srcX,srcY,2,srcX,srcY,13);
        sg.addColorStop(0,'rgba(255,69,96,0.9)'); sg.addColorStop(1,'rgba(200,0,40,0.6)');
        ctx.beginPath(); ctx.arc(srcX,srcY,13,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 10px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('☢',srcX,srcY);
        ctx.fillStyle='rgba(255,69,96,0.7)'; ctx.font='8px Nunito'; ctx.textBaseline='top';
        ctx.fillText('Quelle',srcX,srcY+15);

        // Particles
        ps.forEach(p => {
          if (p.type==='ray') {
            // Strahl
            const alpha=Math.min(1,p.life/20);
            ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,69,96,${alpha*0.9})`; ctx.fill();
            // Schweif
            ctx.beginPath(); ctx.moveTo(p.x-p.vx*6,p.y);
            ctx.lineTo(p.x,p.y);
            ctx.strokeStyle=`rgba(255,69,96,${alpha*0.4})`; ctx.lineWidth=2; ctx.stroke();
          } else if (p.type==='electron') {
            const alpha=Math.min(1,p.life/15);
            ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2);
            ctx.fillStyle=`rgba(108,99,255,${alpha})`; ctx.fill();
          } else if (p.type==='ion') {
            const alpha=Math.min(1,p.life/20);
            ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,183,3,${alpha*0.9})`; ctx.fill();
            ctx.fillStyle=`rgba(255,183,3,${alpha})`; ctx.font='7px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('+',p.x,p.y);
          } else if (p.type==='spark') {
            const alpha=Math.min(1,p.life/10);
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${alpha*0.9})`; ctx.fill();
            ctx.strokeStyle=`rgba(108,99,255,${alpha})`; ctx.lineWidth=1.5; ctx.stroke();
          } else if (p.type==='click') {
            const alpha=Math.min(1,p.life/20);
            ctx.fillStyle=`rgba(255,69,96,${alpha})`;
            ctx.font=`bold ${14+p.scale}px Nunito`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('KLICK!',W/2,H-16);
          }
        });
      }

      function tick() {
        const cv=document.getElementById('gTubeCanvas'); if(!cv)return;
        const ctx=cv.getContext('2d');
        const W=cv.width, H=cv.height, TY=H/2, TX=40, TW=W-80;
        const spd=slowMode?0.18:1;
        // update particles
        particles=particles.filter(p=>{
          p.x+=p.vx*spd; p.y+=p.vy*spd; p.life-=spd;
          if(p.type==='electron'&&p.x>TX+TW-10){
            // reached anode — trigger spark
            for(let i=0;i<8;i++) particles.push({type:'spark',x:TX+TW/2+(Math.random()-0.5)*40,y:TY+(Math.random()-0.5)*20,vx:0,vy:0,life:12/spd,r:4+Math.random()*6});
            if(!particles.find(p2=>p2.type==='click')){
              totalClicks++; document.getElementById('gClickNum').textContent=totalClicks;
              particles.push({type:'click',x:0,y:0,vx:0,vy:0,life:25/spd,scale:0});
              const phN=document.getElementById('gPhaseInfo');
              if(phN) phN.innerHTML=PHASES[3];
            }
          }
          return p.life>0;
        });
        drawTube(ctx,W,H,particles);
        animId=requestAnimationFrame(tick);
      }

      function fireParticle() {
        const TY=90, TX=40;
        const spd=slowMode?0.18:1;
        const d1=slowMode?1600:300, d2=slowMode?1300:250;
        // Main ray
        const ray={type:'ray',x:TX-22+13,y:TY,vx:3.5+Math.random(),vy:0,life:40/spd};
        particles.push(ray);
        // Phase 1 info
        const phN=document.getElementById('gPhaseInfo');
        if(phN) phN.innerHTML=PHASES[0];
        // After delay: ionize & create electrons
        setTimeout(()=>{
          if(phN) phN.innerHTML=PHASES[1];
          const ionX=TX+40+Math.random()*80;
          for(let i=0;i<3+activity;i++){
            const ex=ionX+i*18;
            particles.push({type:'ion',x:ex,y:TY+(Math.random()-0.5)*20,vx:0.2,vy:(Math.random()-0.5)*0.5,life:35/spd});
            // electrons go toward wire
            particles.push({type:'electron',x:ex,y:TY+(Math.random()-0.5)*30,vx:2+Math.random()*2,vy:(TY-particles[particles.length-1].y)*0.08,life:40/spd});
          }
          setTimeout(()=>{
            if(phN) phN.innerHTML=PHASES[2];
            // secondary electrons (avalanche)
            for(let i=0;i<(voltage/100)*2;i++){
              particles.push({type:'electron',x:TX+60+Math.random()*80,y:TY+(Math.random()-0.5)*25,vx:2.5+Math.random()*2,vy:(Math.random()-0.5),life:35/spd});
            }
          },d2);
        },d1);
      }

      window._gmFire=function(){fireParticle();};
      window._gmSlowToggle=function(){
        slowMode=!slowMode;
        const btn=document.getElementById('gSlowBtn');
        if(btn){
          btn.textContent=slowMode?'⚡ Normal':'🐢 Zeitlupe';
          btn.style.background=slowMode?'rgba(0,212,170,0.18)':'transparent';
          btn.style.borderColor=slowMode?'rgba(0,212,170,0.7)':'rgba(0,212,170,0.4)';
        }
        // Clear existing fast particles when switching to slow so nothing looks glitchy
        particles=[];
      };
      window._gmVolt=function(){
        voltage=parseInt(document.getElementById('gVolt').value);
        document.getElementById('gVoltV').textContent=voltage+' V';
      };
      window._gmAct=function(){
        activity=parseInt(document.getElementById('gAct').value);
        const labels=['sehr gering','gering','mittel','hoch','sehr hoch','extrem'];
        document.getElementById('gActV').textContent=labels[activity-1]||'mittel';
      };
      window._gmAutoToggle=function(){
        autoMode=!autoMode;
        document.getElementById('gAutoBtn').textContent=autoMode?'⏸ Stop':'▶ Auto';
        document.getElementById('gAutoBtn').classList.toggle('active',autoMode);
        if(autoMode){
          function autoFire(){
            if(!autoMode)return;
            fireParticle();
            const delay=Math.max(400,1200-activity*150);
            autoTimer=setTimeout(autoFire,delay+(Math.random()-0.5)*200);
          }
          autoFire();
        } else {
          clearTimeout(autoTimer);
        }
      };

      // ---- DISTANCE MODE ----
      function drawDist(){
        const r=parseFloat(document.getElementById('gR').value);
        const A0=parseFloat(document.getElementById('gA0').value);
        document.getElementById('gRv').textContent=r+' cm';
        document.getElementById('gA0v').textContent=A0;
        const I=Math.round(A0/(r*r));

        const cv=document.getElementById('gDistCanvas'); if(!cv)return;
        const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
        ctx.clearRect(0,0,W,H);
        const pad=36, padB=22;

        // Grid lines
        ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
        for(let i=1;i<5;i++){
          const y=(H-padB)-(i/4)*(H-padB-10);
          ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-8,y); ctx.stroke();
        }

        // Axes
        ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(pad,10); ctx.lineTo(pad,H-padB); ctx.lineTo(W-8,H-padB); ctx.stroke();

        // Curve fill
        ctx.beginPath();
        for(let x=1;x<=20;x++){
          const px=pad+(x/20)*(W-pad-8);
          const Ix=A0/(x*x);
          const py=(H-padB)-(Ix/A0)*(H-padB-12);
          x===1?ctx.moveTo(px,Math.max(12,py)):ctx.lineTo(px,Math.max(12,py));
        }
        ctx.lineTo(W-8,H-padB); ctx.lineTo(pad,H-padB);
        ctx.fillStyle='rgba(108,99,255,0.06)'; ctx.fill();

        // Curve line
        ctx.beginPath();
        for(let x=1;x<=20;x++){
          const px=pad+(x/20)*(W-pad-8);
          const py=(H-padB)-(A0/(x*x)/A0)*(H-padB-12);
          x===1?ctx.moveTo(px,Math.max(12,py)):ctx.lineTo(px,Math.max(12,py));
        }
        ctx.strokeStyle='#6c63ff'; ctx.lineWidth=2.5; ctx.stroke();

        // 2r marker (dashed vertical)
        if(r*2<=20){
          const px2=pad+(r*2/20)*(W-pad-8);
          const I2=Math.round(A0/((r*2)*(r*2)));
          const py2=(H-padB)-(I2/A0)*(H-padB-12);
          ctx.beginPath(); ctx.setLineDash([3,4]); ctx.moveTo(px2,H-padB); ctx.lineTo(px2,Math.max(12,py2));
          ctx.strokeStyle='rgba(0,212,170,0.5)'; ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle='rgba(0,212,170,0.7)'; ctx.font='8px Nunito'; ctx.textAlign='center';
          ctx.fillText('2r',px2,H-padB+10);
        }

        // Current point
        const px=pad+(r/20)*(W-pad-8);
        const py=(H-padB)-(I/A0)*(H-padB-12);
        // Dotted crosshair
        ctx.setLineDash([3,3]); ctx.strokeStyle='rgba(255,77,141,0.35)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(pad,Math.max(12,py)); ctx.lineTo(px,Math.max(12,py)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px,H-padB); ctx.lineTo(px,Math.max(12,py)); ctx.stroke();
        ctx.setLineDash([]);
        // Point
        ctx.beginPath(); ctx.arc(px,Math.max(12,py),7,0,Math.PI*2);
        ctx.fillStyle='#ff4d8d'; ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 8px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(r,px,Math.max(12,py));

        // Axis labels
        ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='9px Nunito'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        [0,5,10,15,20].forEach(v=>{const x=pad+(v/20)*(W-pad-8);ctx.fillText(v,x,H-padB+10);});
        ctx.fillText('Abstand r (cm)',W/2,H-padB+20);
        ctx.save(); ctx.translate(14,(H-padB)/2); ctx.rotate(-Math.PI/2); ctx.fillText('Intensität (%)',0,0); ctx.restore();
        // Y axis values
        ctx.textAlign='right';
        ['100%','75%','50%','25%'].forEach((l,i)=>{
          const y=(H-padB)-((4-i)/4)*(H-padB-12);
          ctx.fillText(l,pad-3,y+3);
        });

        // Geiger tube schematic at current position
        const detX=pad+(r/20)*(W-pad-8);
        ctx.fillStyle='rgba(30,33,56,0.85)';
        ctx.fillRect(detX-12,H-padB-48,24,28); ctx.strokeStyle='#6c63ff'; ctx.lineWidth=1.5;
        ctx.strokeRect(detX-12,H-padB-48,24,28);
        ctx.fillStyle='#6c63ff'; ctx.font='bold 8px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('GM',detX,H-padB-34);

        document.getElementById('gDistInfo').innerHTML=
          `Bei <strong>${r} cm</strong>: <strong style="color:#ff4d8d">${I} Imp/s</strong> (${Math.round(I/A0*100)}% der Ausgangsintensität)<br>` +
          `Formel: I = A₀/r² = ${A0}/${r}² = <strong>${I}</strong>` +
          (r*2<=20 ? `<br>Bei doppeltem Abstand (${r*2} cm): <strong style="color:#00d4aa">${Math.round(A0/((r*2)*(r*2)))} Imp/s</strong> → nur noch ${Math.round(A0/((r*2)*(r*2))/A0*100)}%` : '');
      }

      window._gmDist=function(){drawDist();};
      window._gmMode=function(s){
        ['tube','distance'].forEach(k=>{
          document.getElementById('gm_'+k).classList.toggle('active',k===s);
          document.getElementById(k==='tube'?'gTubePanel':'gDistPanel').style.display=k===s?'block':'none';
        });
        mode=s;
        if(s==='distance'){
          cancelAnimationFrame(animId); animId=null;
          clearTimeout(autoTimer); autoMode=false;
          drawDist();
        } else {
          if(!animId) tick();
        }
      };

      // Start tube animation
      tick();
    }
  },

  // SIM 5: Abschirmung interaktiv
  absorption: {
    title: '🧱 Absorption – Messung & Auswertung',
    init(m) {

      // ── Physikalische Modellparameter ──────────────────────────────
      // Nullrate: natürliche Hintergrundstrahlung
      const NULLRATE = 14; // Imp/s (realistisch ~840 Imp/min)

      // Schwächungskoeffizienten µ (1/mm) für Gamma (exponentiell)
      const MU = { papier: 0.008, alu: 0.045, blei: 0.68 };

      // Schwelldicken für Alpha und Beta (threshold-Modell)
      // Alpha: gestoppt ab 0.1 mm Papier, sofort bei Alu/Blei
      // Beta:  gestoppt ab ~5 mm Alu; Papier schwächt kaum (≥2 mm stoppt ~40%)
      function getTransmission(strahlung, mat, d_mm) {
        if (strahlung === 'alpha') {
          if (mat === 'papier') return d_mm >= 0.1 ? 0 : 1;
          return 0; // Alu/Blei stoppen sofort
        }
        if (strahlung === 'beta') {
          if (mat === 'papier') return d_mm >= 3 ? 0.38 : 1; // Papier schwächt kaum
          if (mat === 'alu')    return d_mm >= 5  ? 0 : Math.exp(-0.18 * d_mm);
          if (mat === 'blei')   return Math.exp(-0.35 * d_mm);
        }
        if (strahlung === 'gamma') {
          return Math.exp(-MU[mat] * d_mm);
        }
        return 1;
      }

      // Rauschen: realistisch ±√N (Poisson)
      function withNoise(rate) {
        const sigma = Math.sqrt(Math.max(1, rate));
        return Math.max(0, Math.round(rate + (Math.random() - 0.5) * 2 * sigma));
      }

      // Quellenaktivität (Brutto-Zählrate ohne Abschirmung)
      const A0 = { alpha: 380, beta: 520, gamma: 290 };

      // ── Unbekannte Probe für Tab 2 (zufällig, reproducible) ─────────
      const PROBE = {

        beta:  140 + Math.floor(Math.random() * 180), // 140–320 Imp/s

      let activeTab = 'kurve';

      let probe = { schritt: 0, werte: [] }; // 0=ohne,1=papier,2=alu,3=blei

      // ── HTML ────────────────────────────────────────────────────────

        <button class="sbtn"        id="ab_tab_probe" onclick="_abTab('probe')">🔬 Probe bestimmen</button>
      </div>

      <!-- ═══ TAB 1: ABSORPTIONSKURVE ═══ -->
      <div id="ab_kurvePanel">

          <div style="font-size:10px;font-weight:900;color:var(--p2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">📋 Versuchsauftrag</div>

      // ── Kurvenzeichnung (Versuchsaufbau-Canvas) ──────────────────────
      function drawSetup() {
        const cv = document.getElementById('abkCanvas'); if (!cv) return;
        const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
        ctx.clearRect(0, 0, W, H);
        const d = parseFloat(document.getElementById('abkD')?.value || 0);
        const mat = kurve.mat;
        const st = kurve.strahlung;
        const COLS = { alpha: '#ff9f1c', beta: '#6c63ff', gamma: '#00d4aa' };
        const MAT_COL = { papier: '#d4a96a', alu: '#aab0c0', blei: '#5a5a6a' };
        const col = COLS[st];

        // Quelle
        const sg = ctx.createRadialGradient(22, H/2, 2, 22, H/2, 14);
        sg.addColorStop(0, '#ffb703'); sg.addColorStop(1, '#ff6b00');
        ctx.beginPath(); ctx.arc(22, H/2, 14, 0, Math.PI*2); ctx.fillStyle = sg; ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('☢', 22, H/2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '8px Nunito'; ctx.textBaseline = 'top';
        ctx.fillText('Quelle', 22, H/2 + 17);

        // Einlaufstrahl
        ctx.beginPath(); ctx.moveTo(36, H/2); ctx.lineTo(90, H/2);
        ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke();

        // Material
        const bw = Math.max(8, Math.min(d * 2.5, 60));
        const matGrad = ctx.createLinearGradient(90, 0, 90 + bw, 0);
        const mc = MAT_COL[mat];
        matGrad.addColorStop(0, mc + 'cc'); matGrad.addColorStop(1, mc + '66');
        ctx.fillStyle = matGrad;
        ctx.fillRect(90, 12, bw, H - 24);
        ctx.strokeStyle = mc; ctx.lineWidth = 1.5; ctx.strokeRect(90, 12, bw, H - 24);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const matLabels = { papier: 'Papier', alu: 'Alu', blei: 'Blei' };
        if (bw > 16) ctx.fillText(matLabels[mat], 90 + bw/2, H/2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '8px Nunito'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(d + ' mm', 90 + bw/2, H - 3);

        // Ausgehender Strahl (Transmission)
        const trans = getTransmission(st, mat, d);
        const startX = 90 + bw;
        if (trans > 0.01) {
          ctx.beginPath(); ctx.moveTo(startX, H/2); ctx.lineTo(W - 30, H/2);
          ctx.globalAlpha = Math.max(0.08, trans); ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Detektor (GMZ)
        ctx.fillStyle = 'rgba(30,33,56,0.9)';
        ctx.fillRect(W - 28, H/2 - 20, 22, 40);
        ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.strokeRect(W - 28, H/2 - 20, 22, 40);
        ctx.fillStyle = trans > 0.01 ? col : 'rgba(255,255,255,0.2)';
        ctx.font = 'bold 8px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('GM', W - 17, H/2 - 6);
        ctx.fillText(trans > 0.01 ? '↯' : '–', W - 17, H/2 + 6);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '8px Nunito'; ctx.textBaseline = 'top';
        ctx.fillText('Detektor', W - 17, H/2 + 22);
      }

      function updateKurveDisplay() {
        const d = parseFloat(document.getElementById('abkD')?.value || 0);
        document.getElementById('abkDv').textContent = d + ' mm';
        const gross = withNoise((A0[kurve.strahlung] * getTransmission(kurve.strahlung, kurve.mat, d)) + NULLRATE);
        const netto = Math.max(0, gross - NULLRATE);
        document.getElementById('abkBrutto').textContent = gross;
        document.getElementById('abkNetto').textContent = netto;
        drawSetup();
      }

      function renderKurveTable() {
        const el = document.getElementById('abkTable');
        if (!kurve.messungen.length) {
          el.textContent = 'Noch keine Messungen – wähle eine Dicke und drücke 📍';
          return;
        }
        const sorted = [...kurve.messungen].sort((a, b) => a.d - b.d);
        let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">';
        html += `<tr style="color:var(--p2)">
          <th style="text-align:left;padding:3px 6px">d (mm)</th>
          <th style="text-align:right;padding:3px 6px">Brutto (Imp/s)</th>
          <th style="text-align:right;padding:3px 6px">Netto (Imp/s)</th>
        </tr>`;
        sorted.forEach(m => {
          html += `<tr style="border-top:1px solid var(--bd2)">
            <td style="padding:3px 6px">${m.d}</td>
            <td style="text-align:right;padding:3px 6px">${m.gross}</td>
            <td style="text-align:right;padding:3px 6px;color:var(--ok);font-weight:800">${m.netto}</td>
          </tr>`;
        });
        html += '</table></div>';
        // Hinweis auf Halbwertsdicke wenn genug Messungen
        if (sorted.length >= 4) {
          const n0 = sorted[0].netto;
          const half = n0 / 2;
          const idx = sorted.findIndex(m => m.netto <= half);
          const hint = document.getElementById('abkHinweis');
          if (idx > 0 && hint) {
            const d1 = sorted[idx-1], d2 = sorted[idx];
            const dHalf = (d1.d + d2.d) / 2;
            hint.innerHTML = `💡 Aus deinen Messwerten: Halbwertsdicke ≈ <strong style="color:var(--ok)">${dHalf} mm</strong> (interpoliert zwischen ${d1.d} und ${d2.d} mm)`;
          }
        }
        el.innerHTML = html;
      }

      // ── Probe-Logik ─────────────────────────────────────────────────
      function getProbeVal(schritt) {
        // schritt: 0=ohne, 1=nach Papier, 2=nach Alu, 3=nach Blei(30mm)
        let rate = NULLRATE;
        if (schritt === 0) rate += PROBE.alpha + PROBE.beta + PROBE.gamma;
        if (schritt === 1) rate += PROBE.beta + PROBE.gamma; // α gestoppt durch Papier
        if (schritt === 2) rate += PROBE.gamma;              // β gestoppt durch Alu
        if (schritt === 3) rate += PROBE.gamma * getTransmission('gamma', 'blei', 30); // γ geschwächt
        return withNoise(rate);
      }

  halbzeit: {

      m.innerHTML=`
      <div class="cr"><div class="cl">Anfangsmenge N₀</div><input type="range" min="100" max="1000" value="500" step="100" id="hN0" oninput="hUpd()"><div class="cv" id="hN0v">500</div></div>
      <div class="cr"><div class="cl">Halbwertszeit t½</div><input type="range" min="1" max="10" value="3" id="hT" oninput="hUpd()"><div class="cv" id="hTv">3 Jahre</div></div>
      <canvas id="hCanvas" width="280" height="150" style="width:100%;border-radius:var(--rs);background:var(--bg);margin:10px 0"></canvas>

        <div style="font-size:11px;font-weight:800;color:var(--tx2);margin-bottom:6px">ZEITPUNKT ABLESEN</div>
        <div class="cr"><div class="cl">Zeit t</div><input type="range" min="0" max="30" value="6" id="hTime" oninput="hUpd()"><div class="cv" id="hTimev">6</div></div>
      </div>`;

      function hUpd(){
        const N0=parseFloat(document.getElementById('hN0').value);
        const T=parseFloat(document.getElementById('hT').value);
        const t=parseFloat(document.getElementById('hTime').value);
        document.getElementById('hN0v').textContent=N0;
        document.getElementById('hTv').textContent=T+' Jahre';
        document.getElementById('hTimev').textContent=t+' Jahre';

        const cv=document.getElementById('hCanvas');
        if(!cv)return;
        const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
        ctx.clearRect(0,0,W,H);
        const maxT=30,pad=30;
        // Axes
        ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pad,8);ctx.lineTo(pad,H-20);ctx.lineTo(W-8,H-20);ctx.stroke();
        // Halflife markers
        for(let i=1;i*T<=maxT;i++){
          const x=pad+(i*T/maxT)*(W-pad-8);
          ctx.beginPath();ctx.moveTo(x,H-20);ctx.lineTo(x,H-14);
          ctx.strokeStyle='rgba(255,183,3,0.3)';ctx.lineWidth=1;ctx.stroke();
          if(i<=5){ctx.fillStyle='rgba(255,183,3,0.5)';ctx.font='8px Nunito';ctx.textAlign='center';ctx.fillText(i+'·t½',x,H-6);}
        }
        // Curve
        ctx.beginPath();
        for(let xi=0;xi<=W-pad-8;xi++){
          const tt=(xi/(W-pad-8))*maxT;
          const N=N0*Math.pow(0.5,tt/T);
          const px=pad+xi;
          const py=(H-20)-(N/N0)*(H-30);
          xi===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.strokeStyle='#6c63ff';ctx.lineWidth=2.5;ctx.stroke();
        // Fill
        ctx.lineTo(W-8,H-20);ctx.lineTo(pad,H-20);ctx.fillStyle='rgba(108,99,255,0.07)';ctx.fill();
        // Current point
        const Nt=N0*Math.pow(0.5,t/T);
        const px=pad+(t/maxT)*(W-pad-8);
        const py=(H-20)-(Nt/N0)*(H-30);
        // Dotted lines
        ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,77,141,0.4)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pad,py);ctx.lineTo(px,py);ctx.stroke();
        ctx.beginPath();ctx.moveTo(px,H-20);ctx.lineTo(px,py);ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);
        ctx.fillStyle='#ff4d8d';ctx.fill();
        // Labels
        ctx.fillStyle='var(--tx2)';ctx.font='10px Nunito';ctx.textAlign='center';
        ctx.fillText('Zeit (Jahre)',W/2,H-2);
        ctx.save();ctx.translate(10,(H-20)/2);ctx.rotate(-Math.PI/2);ctx.fillText('Kerne N',0,0);ctx.restore();
        document.getElementById('hInfo').innerHTML=`Bei t = <strong>${t} Jahren</strong> (= ${(t/T).toFixed(1)} Halbwertszeiten): <strong>N = ${Math.round(Nt)}</strong> von ${N0} Kernen (${Math.round(Nt/N0*100)}%). Formel: N = ${N0}·(½)^(${t}/${T}) = ${Math.round(Nt)}`;
      }
      window.hUpd=hUpd; hUpd();
    }
  },

  strahlung: {

    init(m) {

      m.innerHTML=`
      <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">
        <button class="sbtn active" id="sd_alpha" onclick="_sdSel('alpha')">α Alpha</button>
        <button class="sbtn" id="sd_betam" onclick="_sdSel('betam')">β⁻ Beta-minus</button>

      </div>
      <canvas id="sdCanvas" width="280" height="160" style="width:100%;border-radius:var(--rs);background:var(--bg);margin-bottom:8px"></canvas>
      <div style="text-align:center;font-size:13px;font-weight:900;padding:7px 12px;background:var(--bg3);border-radius:8px;margin-bottom:8px;color:var(--tx);letter-spacing:0.3px" id="sdEq"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px">
        <button class="sbtn active" onclick="_sdAnim()">▶ Animation</button>
      </div>
      <div class="sr" id="sdInfo"></div>`;

      // Draw nucleus: shows up to ~40 representative balls, scales for large nuclei
      function drawNuc(ctx, cx, cy, Z, N, r) {
        const total = Z + N; if (!total) return;
        // For large nuclei: show representative subset, keeping Z:N ratio
        const MAX_BALLS = 40;
        let dZ = Z, dN = N;
        if (total > MAX_BALLS) {
          const scale = MAX_BALLS / total;
          dZ = Math.max(1, Math.round(Z * scale));
          dN = Math.max(1, Math.round(N * scale));
        }
        const dTotal = dZ + dN;
        const phi = Math.PI * (3 - Math.sqrt(5));
        const ballR = Math.max(2.5, Math.min(r * 0.88, r / (Math.sqrt(dTotal) * 0.72)));
        // Interleave protons and neutrons evenly across positions (no clustering)
        const types = [];
        for (let i = 0; i < dTotal; i++) {
          // Place proton if ratio demands it, else neutron
          const pSoFar = types.filter(t => t === 0).length;
          const nSoFar = types.filter(t => t === 1).length;
          const pRatio = pSoFar / Math.max(1, i);
          types.push(pRatio <= dZ / dTotal && pSoFar < dZ ? 0 : 1);
        }
        // Fisher-Yates shuffle with LCG pseudo-random (seeded, deterministic but well-mixed)
        let seed = dZ * 31 + dN * 17;
        function lcg() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; }
        for (let i = types.length - 1; i > 0; i--) {
          const j = Math.floor(lcg() * (i + 1));
          [types[i], types[j]] = [types[j], types[i]];
        }
        const pos = [];
        for (let i = 0; i < dTotal; i++) {
          const rad = Math.sqrt(i / Math.max(1, dTotal - 0.5));
          pos.push([cx + rad * r * Math.cos(i * phi), cy + rad * r * Math.sin(i * phi)]);
        }
        pos.forEach(([x, y]) => { ctx.beginPath(); ctx.arc(x + 1, y + 1.5, ballR, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill(); });
        [...pos.keys()].sort((a, b) => pos[a][1] - pos[b][1]).forEach(i => {
          const [x, y] = pos[i];
          const isP = types[i] === 0;
          const g = ctx.createRadialGradient(x - ballR * 0.32, y - ballR * 0.36, ballR * 0.04, x, y, ballR);
          g.addColorStop(0, isP ? '#f1948a' : '#dfe6e9'); g.addColorStop(1, isP ? '#c0392b' : '#95a5a6');
          ctx.beginPath(); ctx.arc(x, y, ballR, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
          ctx.beginPath(); ctx.arc(x - ballR * 0.3, y - ballR * 0.32, ballR * 0.26, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.fill();
        });
      }

      // Draw alpha particle: exactly 2 protons + 2 neutrons in 2x2 cluster
      function drawAlpha(ctx, cx, cy, r) {
        const ballR = r * 0.52;
        const offsets = [[-1,-1],[1,-1],[-1,1],[1,1]];
        const isProton = [true, false, false, true]; // mix: 2p + 2n
        offsets.forEach(([ox, oy], i) => {
          const x = cx + ox * ballR * 0.95, y = cy + oy * ballR * 0.95;
          ctx.beginPath(); ctx.arc(x + 1, y + 1.5, ballR, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();
          const g = ctx.createRadialGradient(x - ballR * 0.32, y - ballR * 0.36, ballR * 0.04, x, y, ballR);
          const isP = isProton[i];
          g.addColorStop(0, isP ? '#f1948a' : '#dfe6e9'); g.addColorStop(1, isP ? '#c0392b' : '#95a5a6');
          ctx.beginPath(); ctx.arc(x, y, ballR, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
          ctx.beginPath(); ctx.arc(x - ballR * 0.3, y - ballR * 0.32, ballR * 0.26, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.fill();
        });
      }

      function draw() {
        const cv = document.getElementById('sdCanvas'); if (!cv) return;
        const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
        ctx.clearRect(0, 0, W, H);
        const d = DECAYS[sel];
        // Layout: mother left, arrow middle, daughter + particle right
        const p = Math.min(1, phase);  // 0=before, 1=after
        const mA = d.mother.A, dA = d.daughter.A;
        const mR = Math.max(8, Math.min(26, 5.2 * Math.cbrt(mA)));
        const dR = Math.max(8, Math.min(26, 5.2 * Math.cbrt(dA)));
        const pR = sel === 'alpha' ? 8 : 5;
        // Positions
        const mX = 62, mY = H / 2;
        const dX = 185, dY = H / 2 - 12;
        const pX = 185 + dR + pR + 10 + p * 18, pY = H / 2 + dR + 6;

        // Mother nucleus (fades as p increases)
        ctx.globalAlpha = 1 - p * 0.4;
        drawNuc(ctx, mX, mY, d.mother.Z, d.mother.N, mR);
        // Mother label
        ctx.globalAlpha = 1 - p * 0.4;
        ctx.fillStyle = 'var(--tx2)'; ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(d.mother.A + d.mother.sym, mX, mY + mR + 14);
        ctx.globalAlpha = 1;

        // Arrow (appears during animation)
        if (p > 0.1) {
          ctx.globalAlpha = Math.min(1, (p - 0.1) * 3);
          ctx.strokeStyle = d.color; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
          ctx.beginPath(); ctx.moveTo(mX + mR + 4, mY); ctx.lineTo(dX - dR - 8, dY);
          ctx.stroke(); ctx.setLineDash([]);
          // arrowhead
          ctx.fillStyle = d.color;
          ctx.beginPath(); ctx.moveTo(dX - dR - 5, dY); ctx.lineTo(dX - dR - 13, dY - 4); ctx.lineTo(dX - dR - 13, dY + 4); ctx.fill();
          ctx.globalAlpha = 1;
        }

        // Daughter nucleus
        if (p > 0.3) {
          ctx.globalAlpha = Math.min(1, (p - 0.3) * 2.5);
          drawNuc(ctx, dX, dY, d.daughter.Z, d.daughter.N, dR);
          ctx.fillStyle = 'var(--tx2)'; ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
          ctx.fillText(d.daughter.A + d.daughter.sym, dX, dY + dR + 14);
          ctx.globalAlpha = 1;
        }

        // Emitted particle
        if (p > 0.5) {

          if (sel === 'alpha') {

    title: '📏 Sim 2: Abstandsgesetz – Messen & Auswerten',
    init(m) {

      let measurements = [];

      m.innerHTML = `

      function getI(r) {
        // I = A0/r² + realistic noise (~8%)
        const true_I = A0 / (r * r);
        const noise = true_I * (0.08 * (Math.random() - 0.5) * 2);
        return Math.round(true_I + noise);
      }

      function drawSetup() {
        const cv = document.getElementById('saCanvas'); if (!cv) return;
        const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
        ctx.clearRect(0, 0, W, H);
        const r = parseInt(document.getElementById('saR').value);
        const srcX = 20, srcY = H / 2;
        const maxR = 30;
        const detX = srcX + (r / maxR) * (W - 60);

        // Source
        const sg = ctx.createRadialGradient(srcX, srcY, 2, srcX, srcY, 14);
        sg.addColorStop(0, '#ffb703'); sg.addColorStop(1, '#ff6b00');

        ctx.fillText('☢', srcX, srcY);

        // Radiation lines
        const I = A0 / (r * r);
        const lineCount = Math.max(1, Math.min(12, Math.round(I / 30)));
        for (let i = 0; i < lineCount; i++) {
          const angle = (i / lineCount) * Math.PI * 2;
          const len = Math.min(detX - srcX - 16, 60 + Math.random() * 20);
          ctx.beginPath();
          ctx.moveTo(srcX + 14 * Math.cos(angle), srcY + 14 * Math.sin(angle));
          ctx.lineTo(srcX + (14 + len) * Math.cos(angle), srcY + (14 + len) * Math.sin(angle));
          ctx.strokeStyle = `rgba(255,183,3,${0.15 + (lineCount / 12) * 0.5})`;
          ctx.lineWidth = 1.2; ctx.stroke();
        }

        // Distance line
        ctx.beginPath(); ctx.moveTo(srcX + 14, srcY + 20); ctx.lineTo(detX - 10, srcY + 20);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('r = ' + r + ' cm', (srcX + 14 + detX - 10) / 2, srcY + 22);

        // Detector (Geiger tube)
        ctx.fillStyle = '#2d2d5e';
        ctx.fillRect(detX - 10, srcY - 22, 20, 44);
        ctx.strokeStyle = '#6c63ff'; ctx.lineWidth = 2; ctx.strokeRect(detX - 10, srcY - 22, 20, 44);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('GM', detX, srcY);
        // Impulse display
        const Ishow = getI(r);
        ctx.fillStyle = '#6c63ff'; ctx.font = 'bold 9px Nunito'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(Math.round(A0/(r*r)) + ' Imp/s', detX, srcY - 26);
      }


      function updateTable() {
        const el = document.getElementById('saTable');
        if (!measurements.length) { el.textContent = 'Noch keine Messungen – wähle einen Abstand und drücke 📍'; return; }
        const sorted = [...measurements].sort((a, b) => a.r - b.r);
        let html = '<table style="width:100%;border-collapse:collapse;font-size:11px">';
        html += '<tr style="color:var(--p2)"><th style="text-align:left;padding:2px 6px">r (cm)</th><th style="text-align:right;padding:2px 6px">I (Imp/s)</th><th style="text-align:right;padding:2px 6px">I·r²</th></tr>';
        sorted.forEach(({ r, I }) => {
          const ir2 = Math.round(I * r * r);
          html += `<tr><td style="padding:2px 6px">${r}</td><td style="text-align:right;padding:2px 6px">${I}</td><td style="text-align:right;padding:2px 6px;color:var(--ok)">${ir2}</td></tr>`;
        });
        html += '</table>';
        el.innerHTML = html;
        // Auswertung
        const auswEl = document.getElementById('saAuswert');
        if (measurements.length >= 3 && auswEl) {
          const ir2vals = sorted.map(m => m.I * m.r * m.r);
          const avg = ir2vals.reduce((a, b) => a + b, 0) / ir2vals.length;
          const dev = Math.round(Math.sqrt(ir2vals.map(v => (v - avg) ** 2).reduce((a, b) => a + b, 0) / ir2vals.length) / avg * 100);
          auswEl.innerHTML = `I·r² = ca. <strong>${Math.round(avg)}</strong> (Streuung: ±${dev}%) ${dev < 15 ? '✅ Abstandsquadratgesetz bestätigt!' : '⚠️ Mehr Messungen für besseres Ergebnis'}`;
        }
      }

      window._saMove = function() {

        document.getElementById('saRv').textContent = r + ' cm';

        updateTable();
      };

      window._saReset = function() {
        measurements = []; updateTable(); drawSetup();
      };

      drawSetup();
    }
  },
};

        <div class="txt-highlight">Alphastrahlung besteht aus positiv geladenen Heliumkernen. Betastrahlung besteht aus negativ geladenen Elektronen. Gamma- und Röntgenstrahlung sind ein Teil des elektromagnetischen Spektrums und sind – wie Licht – elektrisch ungeladen. Sie werden deshalb im Magnetfeld nicht abgelenkt.</div>
        <p><strong>Ladung:</strong> Die ionisierende Strahlung einiger radioaktiver Stoffe erfährt im Magnetfeld eine Ablenkung. Jeder stromdurchflossene Leiter ist von einem eigenen Magnetfeld umgeben und erfährt deshalb im äußeren Magnetfeld eine Kraft. Diese Kraft nennt man Lorentzkraft.</p>
        <table class="txt-table">
          <tr><th></th><th>α-Strahlung</th><th>β-Strahlung</th><th>γ-Strahlung</th></tr>
          <tr><td>besteht aus …</td><td>Heliumkernen</td><td>Elektronen</td><td>elektromag. Strahlung</td></tr>
          <tr><td>Ladung</td><td>positiv</td><td>negativ</td><td>neutral</td></tr>
          <tr><td>Ablenkung Magnetfeld</td><td>ja</td><td>ja</td><td>nein</td></tr>
          <tr><td>ionisierend</td><td>stark</td><td>weniger stark</td><td>schwach</td></tr>
          <tr><td>Abschirmung durch …</td><td>Papier, 5 cm Luft</td><td>5 mm Aluminiumblech</td><td>dicke Bleiplatten</td></tr>
        </table>
        <p><em>(Fokus Physik, Cornelsen, NRW, S. 271–272)</em></p>
      </div>`
    },

      hist:{year:'1902 – Rutherford & Soddy: Transmutation',

      scene:{icon:'🔗',role:'🔗 Zerfallsreihen',
        text:'Uran-238 liegt seit der Entstehung der Erde im Gestein. Es zerfällt – aber nicht zu einem stabilen Element. Das Ergebnis ist Thorium-234, ebenfalls instabil. Das zerfällt zu Protactinium. Das zerfällt zu Uran-234. Dann Thorium-230. Radium-226. Radon-222 – ein Gas, das aus dem Boden aufsteigt und sich in schlecht belüfteten Kellern ansammelt. Dann noch sechs weitere Schritte. Insgesamt 14 Zerfälle.<br><br>Am Ende: Blei-206. Stabil. Die Reise ist vorbei.<br><br>Diese Kette läuft seit Milliarden Jahren ab – in jedem Stück Granit, in jedem Keller mit Natursteinboden, unter jedem Haus. Und jeder Schritt folgt präzisen Regeln: Welcher Kern entsteht, lässt sich exakt vorhersagen. Aber warum endet die Reise ausgerechnet bei Blei?<br><br><em>Hinter jedem radioaktiven Zerfall steckt eine Systematik – ablesbar in der Nuklidkarte.</em>'},
      easy:`<div class="txt-block"><h3>🔗 Zerfallsreihen – Vom Uran zum Blei</h3>
        <p>Ein radioaktiver Kern zerfällt – der Tochterkern ist oft auch instabil und zerfällt weiter. So entsteht eine <strong>Zerfallsreihe</strong>, bis schließlich ein stabiles Nuklid entsteht.</p>
        <div class="txt-highlight">Sprungregeln auf der Nuklidkarte (N über Z):<br>α-Zerfall: Z−2, N−2 → 2 Felder links-unten<br>β⁻-Zerfall: Z+1, N−1 → 1 Feld rechts-oben</div>
        <p><strong>Wichtigste natürliche Zerfallsreihen:</strong></p>
        <table class="txt-table">
          <tr><th>Start</th><th>Ende</th><th>α-Zerfälle</th><th>β-Zerfälle</th></tr>
          <tr><td>U-238</td><td>Pb-206</td><td>8</td><td>6</td></tr>
          <tr><td>U-235</td><td>Pb-207</td><td>7</td><td>4</td></tr>
          <tr><td>Th-232</td><td>Pb-208</td><td>6</td><td>4</td></tr>
        </table>
        <p><strong>Beispiele:</strong><br>
        ²²⁶₈₈Ra → ⁴₂α + ²²²₈₆Rn (Radon!)<br>
        ¹³⁷₅₅Cs → ⁰₋₁β + ¹³⁷₅₆Ba</p>
        <div class="txt-highlight">Radon entsteht in der U-238-Reihe – es ist ein Gas und kann sich in Gebäuden ansammeln!</div></div>`,
      orig:`<div class="txt-block"><h3>📚 Fokus Physik – Zerfallsreihen (S. 277)</h3>
        <p>Von allen chemischen Elementen gibt es radioaktive Isotope. Eine Übersicht über alle bekannten Isotope gibt die Nuklidtafel. In jeder Zeile werden dort alle Isotope eines Elements aufgelistet. Die Spaltennummer entspricht der Anzahl der Neutronen. Nuklidtafeln enthalten meist auch die Halbwertszeit eines radioaktiven Isotops und die Zerfallsart.</p>
        <p>Ein α-Zerfall wird in der Nuklidtafel zu einem Sprung um zwei Kästchen nach unten und zwei Kästchen nach links. Ein β-Zerfall, bei dem ein Neutron zu einem Proton wird, entspricht einem Sprung um ein Kästchen nach oben und eins nach links.</p>
        <p>Viele radioaktive Isotope zerfallen in ein Isotop, das wiederum nicht stabil ist. So entstehen Zerfallsreihen, die mitunter recht lang ausfallen können, bis sie endlich ein stabiles Isotop erreichen. Ein wichtiges Beispiel für eine solche Reihe ist der Zerfall von U-238.</p>
        <div class="txt-highlight">²³⁸U → ²³⁴Th → ²³⁴Pa → ²³⁴U → ²³⁰Th → ²²⁶Ra → ²²²Rn → ²¹⁸Po → ²¹⁴Pb → ²¹⁴Bi → ²¹⁴Po → ²¹⁰Pb → ²¹⁰Bi → ²¹⁰Po → ²⁰⁶Pb (stabil)</div>
        <p><em>(Fokus Physik, Cornelsen, NRW, S. 277)</em></p></div>`
    },
