      hist:{year:'1942 – Chicago, erster Kernreaktor der Welt',
        text:'2. Dezember 1942: Enrico Fermi startet unter dem Stadion der Universität Chicago den ersten künstlichen Kernreaktor – „Chicago Pile-1". Als der Reaktor kritisch wird, sagt er ruhig: „Die Reaktion ist selbsttragend." Ein Kollege telegraphiert: „Der italienische Navigator hat soeben die neue Welt betreten." Die Atomenergiezeit beginnt.'},
      scene:{icon:'⚙️',role:'⚙️ Kernreaktor',
        text:'25. April 1986, 1:23 Uhr nachts, Tschernobyl. Die Techniker testen ein Sicherheitssystem. Ein Routinetest. Der Reaktor läuft auf niedriger Leistung, alles scheint normal. Dann drückt ein Techniker auf einen Knopf – den Notabschaltknopf, der den Reaktor sichern soll. Statt ruhiger zu werden, explodiert der Reaktor innerhalb von drei Sekunden.<br><br>Nicht eine Explosion. Zwei. Die erste reißt den 1.000 Tonnen schweren Deckel des Reaktors weg. Die zweite schleudert brennendes Graphit über das gesamte Gelände. Der Reaktorkern liegt offen unter dem Nachthimmel.<br><br>Wie kann ein Sicherheitsknopf eine Katastrophe auslösen? Was passiert in einem Reaktor, das so schnell so außer Kontrolle geraten kann? Und was genau unterscheidet einen Reaktor von einer Atombombe?<br><br><em>Ein Kernreaktor ist eine kontrollierte Kettenreaktion – Tschernobyl zeigt, was passiert, wenn die Kontrolle versagt.</em>'},
      easy:`<div class="txt-block"><h3>⚙️ Kernreaktor – Kontrollierte Kettenreaktion</h3>
        <p><strong>Kernspaltung:</strong> Ein langsames Neutron trifft U-235 → Der Kern spaltet sich in 2 Bruchstücke + 2–3 neue Neutronen + ~200 MeV Energie.</p>
        <div class="txt-highlight">n + ²³⁵U → Spaltprodukte + 2–3 n + Energie (200 MeV)</div>
        <p>Die neuen Neutronen können weitere U-235-Kerne spalten → <strong>Kettenreaktion</strong></p>
        <p><strong>Der Multiplikationsfaktor k:</strong></p>
        <table class="txt-table">
          <tr><th>k-Wert</th><th>Zustand</th><th>Folge</th></tr>
          <tr><td>k < 1</td><td>Unterkritisch</td><td>Reaktion erlischt</td></tr>
          <tr><td>k = 1</td><td>Kritisch</td><td>Stabiler Betrieb</td></tr>
          <tr><td>k > 1</td><td>Überkritisch</td><td>Leistung wächst</td></tr>
        </table>
        <p><strong>Bauteile:</strong> Brennstäbe (U-235), Moderator (Wasser → verlangsamt Neutronen), Steuerstäbe (Bor/Hafnium → absorbieren Neutronen, regulieren k), Kühlmittel (Wasser).</p>
        <div class="txt-highlight">Wirkungsgrad KKW: ~33–40% (Rest = Abwärme ins Kühlwasser)</div></div>`,
      orig:`<div class="txt-block"><h3>📚 Fokus Physik – Kernreaktor (vgl. S. 284ff)</h3>
        <p>Bei der Kernspaltung trifft ein langsames Neutron auf einen U-235-Kern. Dieser spaltet sich in zwei Bruchstücke und setzt dabei 2–3 neue Neutronen sowie ca. 200 MeV Energie frei.</p>
        <p>Die freigesetzten Neutronen können weitere U-235-Kerne spalten – es entsteht eine Kettenreaktion. Der Multiplikationsfaktor k gibt an, wie viele Spaltungen eine einzelne Spaltung im Mittel auslöst: k=1: stationär, k<1: erlischt, k>1: wächst.</p>
        <div class="txt-highlight">Im Kernkraftwerk wird k durch Steuerstäbe (Bor/Hafnium) auf genau 1 gehalten. Der Moderator (Wasser) verlangsamt die schnellen Spaltneutronen auf thermische Energie – U-235 spaltet am effizientesten mit langsamen Neutronen.</div>
        <p>Die Energie der Kernspaltung wird als Wärme freigesetzt, erhitzt Wasser zu Dampf, der eine Turbine antreibt, die einen Generator zur Stromerzeugung betreibt (Wirkungsgrad ~33–40%).</p>
        <p><em>(Fokus Physik, Cornelsen, NRW)</em></p></div>`
    },

      hist:{year:'1986 – Tschernobyl: Was bleibt',
        text:'Nach der Explosion von Reaktor 4 in Tschernobyl werden 600 Tonnen radioaktives Material freigesetzt. Cs-137 (t½=30a), Sr-90 (t½=29a), Pu-239 (t½=24.000a). 2017 wird eine neue Schutzhülle über den Reaktor geschoben – für 100 Jahre. Danach? Das Problem bleibt. Für Jahrtausende.'},
      scene:{icon:'🗄️',role:'🗄️ Endlagerung',
        text:'Deutschland produziert seit über 60 Jahren radioaktiven Abfall. Hunderttausende Tonnen. Heute lagern die gefährlichsten davon – hochradioaktiver Abfall aus Kernkraftwerken – in provisorischen Zwischenbehältern. „Vorläufig." Seit Jahrzehnten.<br><br>Das Problem: Plutonium-239 hat eine Halbwertszeit von 24.000 Jahren. Um auf ein ungefährliches Niveau zu sinken, braucht es etwa zehn Halbwertszeiten – also 240.000 Jahre. Die gesamte bekannte Menschheitsgeschichte umfasst 300.000 Jahre. Das bedeutet: Wir suchen einen Ort, der länger sicher ist als die Zeit, die zwischen uns und dem Homo sapiens liegt.<br><br>Wie baut man etwas, das länger halten muss als jede menschliche Zivilisation? Wer trifft diese Entscheidung? Und wie warnt man Menschen in 100.000 Jahren davor, nicht zu graben?<br><br><em>Endlagerung ist das ungelöste Problem der Kernenergie – und eine der schwierigsten gesellschaftlichen Fragen unserer Zeit.</em>'},
      easy:`<div class="txt-block"><h3>🗄️ Endlagerung – Das ungelöste Problem</h3>
        <p>Hochradioaktiver Abfall aus Kernkraftwerken enthält langlebige Isotope, die über Jahrtausende strahlen:</p>
        <table class="txt-table">
          <tr><th>Isotop</th><th>Halbwertszeit</th><th>10 HWZ</th></tr>
          <tr><td>Cäsium-137</td><td>30 Jahre</td><td>300 Jahre</td></tr>
          <tr><td>Strontium-90</td><td>29 Jahre</td><td>290 Jahre</td></tr>
          <tr><td>Plutonium-239</td><td>24.000 Jahre</td><td>240.000 Jahre</td></tr>
          <tr><td>Americium-241</td><td>432 Jahre</td><td>4.320 Jahre</td></tr>
        </table>
        <div class="txt-highlight">Ein Endlager muss mindestens 100.000 Jahre sicher sein – länger als die gesamte bisherige Menschheitsgeschichte!</div>
        <p><strong>Anforderungen an das Endlager:</strong> Geologisch stabil seit Millionen Jahren, kein fließendes Grundwasser, keine Erdbeben, tiefe Lage (>300m), gesellschaftlicher Konsens.</p>
        <p><strong>CASTOR-Behälter</strong> dienen der Zwischenlagerung: massive Stahl-Guss-Behälter, halten Strahlung, Druck und Hitze stand – aber nur für Jahrzehnte, nicht Jahrtausende.</p>
        <p><strong>Problem Deutschland:</strong> Bis 2031 soll ein Endlager-Standort gefunden sein. Gorleben wurde ausgeschlossen. Der Prozess läuft weiter.</p></div>`,
      orig:`<div class="txt-block"><h3>📚 Fokus Physik – Kernenergie & Endlagerung</h3>
        <p>Bei der Kernspaltung entstehen radioaktive Spaltprodukte mit sehr unterschiedlichen Halbwertszeiten. Kurzlebige Isotope wie Jod-131 (t½=8d) zerfallen schnell. Langlebige wie Plutonium-239 (t½=24.000a) bleiben über Jahrtausende radioaktiv.</p>
        <div class="txt-highlight">Beim Umgang mit radioaktiven Materialien hat man es deshalb oft mit einer ganzen Reihe unterschiedlichster Isotope zu tun. Da es sich chemisch um ganz verschiedene Elemente handelt, haben diese unterschiedlichsten chemischen Eigenschaften. Das spielt bei der Bewertung der Gefahren, die von radioaktiven Materialien ausgehen, eine entscheidende Rolle. (Fokus Physik S. 277)</div>
        <p>Hochradioaktiver Abfall muss in tiefen geologischen Formationen endgelagert werden. Das Wirtsgestein (Salzgestein, Granit oder Ton) muss seit Millionen Jahren stabil sein und darf kein fließendes Grundwasser führen, das radioaktive Stoffe transportieren könnte.</p>
        <p>Die Radioaktivität eines Atomkerns kann durch keine chemische Reaktion verändert werden – sie ist ein rein nukleärer Prozess.</p>
        <p><em>(Fokus Physik, Cornelsen, NRW)</em></p></div>`
    },

      hist:{year:'1945 – Hiroshima: Strahlung und ihre Folgen',

      scene:{icon:'🧬',role:'🧬 Biologische Wirkung',
        text:'Zwei Arbeiter in Tschernobyl bekommen in der Nacht des Unfalls dieselbe Strahlendosis: 1 Gray. Einer war außen auf dem Dach und wurde von Gammastrahlung getroffen. Der andere hat beim Löschen des Brandes radioaktiven Graphitstaub eingeatmet – Alpha-Strahler direkt in der Lunge.<br><br>Beide: 1 Gray. Aber der erste überlebt. Der zweite stirbt innerhalb von Wochen.<br><br>Wie kann dieselbe Dosis so unterschiedliche Folgen haben? Was macht Strahlung im Körper – und warum ist es entscheidend, wo sie entsteht und welche Art sie ist? Und was bedeutet es eigentlich, wenn man sagt: „Diese Dosis ist noch sicher"?<br><br><em>Biologische Strahlenwirkung ist komplexer als eine einzelne Zahl – sie hängt von der Art, dem Ort und der Zeit der Bestrahlung ab.</em>'},
      easy:`<div class="txt-block"><h3>🧬 Biologische Wirkung ionisierender Strahlung</h3>
        <p><strong>Wie schädigt Strahlung?</strong> Ionisierende Strahlung schlägt Elektronen aus Molekülen → Ionisation → chemische Bindungen brechen → DNA-Schäden.</p>
        <div class="txt-highlight">H [Sv] = D [Gy] × w_R<br>Sv = Sievert (biologisch gewichtet)<br>Gy = Gray (absorbierte Energie: 1 Gy = 1 J/kg)<br>w_R = Strahlenwichtungsfaktor</div>
        <p><strong>Wichtungsfaktoren:</strong></p>
        <table class="txt-table">
          <tr><th>Strahlungsart</th><th>w_R</th><th>Bedeutung</th></tr>
          <tr><td>β/γ/Röntgen</td><td>1</td><td>Referenz</td></tr>
          <tr><td>α</td><td>20</td><td>20× schädlicher intern!</td></tr>
          <tr><td>Neutronen</td><td>5–20</td><td>Je nach Energie</td></tr>
        </table>
        <p><strong>LNT-Modell:</strong> Linear No Threshold – jede Dosis erhöht das Krebsrisiko linear, kein Schwellenwert. Basis aller Strahlenschutzgrenzwerte.</p>
        <p><strong>Strahlenschäden:</strong> Somatisch (beim Bestrahlten selbst: Krebs, Gewebeschäden) vs. genetisch (bei Nachkommen).</p></div>`,
      orig:`<div class="txt-block"><h3>📚 Fokus Physik – Wirkung ionisierender Strahlung (S. 279)</h3>
        <p>Radioaktive Stoffe können dem Menschen gefährlich werden. Wenn in unserem Körper unkontrolliert Atome ionisiert werden, kann dies zu verschiedenen Krankheiten führen. Man unterscheidet hier somatische und genetische Schäden. Somatische Schäden betreffen „nur" den eigenen Körper. Neben der Zerstörung von Geweben treten auch Mutationen auf, die Krebs verursachen können. Genetische Schäden treten durch Mutationen in den Keimzellen auf. Es kann z. B. zu Fehlbildungen der Nachkommen kommen.</p>
        <div class="txt-highlight">Zur Bewertung der biologischen Wirkung ionisierender Strahlung dient die Angabe der Äquivalentdosis. Man misst die pro Kilogramm Körpergewebe absorbierte Energie und multipliziert diese mit einem strahlenspezifischen Bewertungsfaktor. So sind z.B. α-Strahlen im Körpergewebe bei gleicher Energie etwa 20-mal gefährlicher als β- und γ-Strahlen. Die Einheit der Äquivalentdosis ist Sievert (Sv): 1 Sv = 1 J/kg.</div>
        <p><em>(Fokus Physik, Cornelsen, NRW, S. 279)</em></p></div>`
    },

    kernfusion:{
      hist:{year:'1939 – Berlin: Die Physik der Sonne',
        text:'Hans Bethe erklärt 1939, wie die Sonne seit Milliarden Jahren leuchtet: durch Kernfusion. 4 Wasserstoffkerne verschmelzen zu Helium – 0,7% der Masse werden zu reiner Energie (E=mc²). Die Sonne verbraucht so 4 Millionen Tonnen Masse pro Sekunde. Bethe erhält dafür 1967 den Nobelpreis für Physik.'},
      scene:{icon:'🌟',role:'🌟 Kernfusion',
        text:'Die Sonne ist 4,6 Milliarden Jahre alt. Sie verbrennt jede Sekunde 600 Millionen Tonnen Wasserstoff. Sie hat dabei noch nie eine Pause gemacht. Und sie hat noch genug Brennstoff für weitere fünf Milliarden Jahre. Keine Abgase, kein CO₂, kein langlebiger radioaktiver Abfall. Nur Energie – in einem Ausmaß, das sich kein Mensch wirklich vorstellen kann.<br><br>Seit den 1950er-Jahren versuchen wir, diesen Prozess auf der Erde nachzubauen. 70 Jahre Forschung. Milliarden an Fördergeldern. Die klügsten Physiker der Welt. Und noch immer hat kein Experiment mehr Energie erzeugt als verbraucht.<br><br>Was macht die Sonne, das wir nicht können? Warum braucht man 100 Millionen Grad – zehnmal heißer als der Sonnenkern? Und warum glauben so viele Wissenschaftler trotzdem, dass Fusion die Energiefrage der Menschheit lösen könnte?<br><br><em>Kernfusion ist die größte Hoffnung und die größte Herausforderung der modernen Physik.</em>'},
      easy:`<div class="txt-block"><h3>🌟 Kernfusion – Energie wie in der Sonne</h3>
        <p><strong>Kernfusion</strong> ist das Gegenteil der Kernspaltung: Leichte Kerne <strong>verschmelzen</strong> zu schwereren – dabei wird Energie frei.</p>
        <div class="txt-highlight">D + T → ⁴₂He + n + 17,6 MeV<br>(Deuterium + Tritium → Helium-4 + Neutron + Energie)</div>
        <p><strong>Warum 100 Mio. °C?</strong> Atomkerne sind positiv geladen und stoßen sich ab (Coulomb-Barriere). Erst bei extremen Temperaturen haben sie genug Energie, um die Abstoßung zu überwinden – dann wirkt die starke Kernkraft.</p>
        <p><strong>Tokamak:</strong> Ringförmige Plasmakammer, in der das heiße Plasma durch starke Magnetfelder schwebend gehalten wird (kein Kontakt mit den Wänden).</p>
        <p><strong>Vorteile gegenüber Spaltung:</strong></p>
        <table class="txt-table">
          <tr><th>Aspekt</th><th>Fusion</th><th>Spaltung</th></tr>
          <tr><td>Brennstoff</td><td>Deuterium (Meerwasser)</td><td>Uran (begrenzt)</td></tr>
          <tr><td>Radioakt. Abfall</td><td>Kaum langlebiger</td><td>Jahrtausende</td></tr>
          <tr><td>Kettenreaktion</td><td>Nicht möglich</td><td>Möglich</td></tr>
        </table>
        <p><strong>ITER:</strong> 35 Nationen, Cadarache/Frankreich. Ziel: Q=10 (10× mehr Energie raus als rein).</p></div>`,
      orig:`<div class="txt-block"><h3>📚 Fokus Physik – Kernfusion (S. 289)</h3>
        <p>Unsere Sonne ist ein Stern, wie es allein in unserer Milchstraße viele Milliarden gibt. Schier unerschöpflich versorgt sie uns mit Energie. Woher nimmt die Sonne diese Energie? Analysen des Sonnenlichts zeigen, dass die Sonne zum größten Teil aus Wasserstoff besteht. In der Sonne wird Wasserstoff zu Helium verschmolzen.</p>
        <div class="txt-highlight">Wenn sich Atomkerne zu nahe kommen, so können sie dabei verschmelzen und neue, schwerere Atomkerne bilden. Dieser Prozess heißt Kernfusion und findet in der Sonne und allen anderen Sternen statt.</div>
        <p>Damit es zur Kernfusion kommt, müssen die Atomkerne sich sehr nahe kommen – und das funktioniert am besten bei sehr hohen Temperaturen. In der Sonne vermuten Astrophysiker Temperaturen von einigen Millionen Grad. Geht der Wasserstoffvorrat zur Neige, so kann der Stern je nach Größe auch schwerere Elemente bis hin zum Eisen gewinnbringend fusionieren.</p>
        <p><em>(Fokus Physik, Cornelsen, NRW, S. 289)</em></p></div>`
    },

function newS(n){return{name:n,completed:[],xp:0,hearts:MH,badges:[],qr:{},sessions:[]};}

let CS=null, curT=null, curPh='text', curTL='easy', curQI=0, curQL=[], qH=MH, qC=0, isTch=false, selCh=-1, wrongAnswers=[];

// ===== SCREENS =====
function showSc(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== LOGIN =====
function switchTab(t){
  const m={new:'tabNew',cont:'tabCont',teach:'tabTeach'};
  Object.values(m).forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(m[t]).style.display='block';
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('active',i===['new','cont','teach'].indexOf(t)));
}
function doNew(){
  const nm=document.getElementById('newName').value.trim();
  if(!nm){document.getElementById('newErr').textContent='Bitte Vorname eingeben!';return;}
  CS=newS(nm); saveS(CS); isTch=false; enterApp();
}
function doCont(){
  const nm=document.getElementById('contName').value.trim();
  const code=document.getElementById('contCode').value.trim();
  if(!nm){document.getElementById('contErr').textContent='Bitte Vorname eingeben!';return;}
  const d=parseCode(code);
  if(!d){document.getElementById('contErr').textContent='Ungültiger Code!';return;}
  if(d.n.toLowerCase().trim()!==nm.toLowerCase().trim()){document.getElementById('contErr').textContent='Name stimmt nicht überein!';return;}
  CS={name:d.n,completed:d.c||[],xp:d.x||0,hearts:d.h||MH,badges:d.b||[],qr:{},sessions:[]};
  saveS(CS); isTch=false; enterApp();
}
function doTeach(){
  if(document.getElementById('teachPw').value!==TPW){document.getElementById('teachErr').textContent='Falsches Passwort!';return;}
  isTch=true;
  CS={name:'Lehrkraft',completed:TOPS.map(t=>t.id),xp:9999,hearts:99,badges:BDGS.map(b=>b.id),qr:{},sessions:[]};
  enterApp();
}
function enterApp(){showSc('mapScreen');renderMap();}

// ===== LEVEL =====
function getLvl(xp){return LVLS.find(l=>xp>=l.min&&xp<l.max)||LVLS[LVLS.length-1];}

// ===== MAP =====
function renderMap(){
  document.getElementById('mapAv').textContent=CS.name.charAt(0).toUpperCase();
  document.getElementById('mapName').textContent=CS.name;
  const lv=getLvl(CS.xp),li=LVLS.indexOf(lv);
  document.getElementById('mapLvl').innerHTML=`${lv.e} Level ${li+1} · ${lv.n}`;
  const xi=CS.xp-lv.min,xr=lv.max-lv.min;
  document.getElementById('xpFill').style.width=Math.min(100,xi/xr*100)+'%';
  document.getElementById('xpLbl').textContent=CS.xp+' XP';

  // Hearts
  const hr=document.getElementById('heartRow');
  hr.innerHTML=Array.from({length:MH},(_,i)=>
    `<span class="hrt${i<CS.hearts?'':' empty'}">❤️</span>`
  ).join('');

  // Badges
  const br=document.getElementById('bdgRow');
  br.innerHTML=BDGS.map(b=>{
    const e=CS.badges.includes(b.id);
    return `<div class="bi"><div class="bic${e?' ea':''}">${b.ic}</div><div class="bnm">${b.n}</div></div>`;
  }).join('');

  // Topics
  const tw=document.getElementById('topicsWrap');
  tw.innerHTML='';
  let mS=false,bS=false;
  TOPS.forEach(t=>{
    if(!t.bon&&!mS){tw.innerHTML+='<div class="stit">📚 Pflichtthemen</div>';mS=true;}
    if(t.bon&&!bS){tw.innerHTML+='<div class="stit bon">⭐ Bonusthemen</div>';bS=true;}
    const dn=CS.completed.includes(t.id);
    const ul=isTch||dn||t.prev===null||CS.completed.includes(t.prev);
    let cl=t.bon?'bon ':'';
    if(dn) cl+='dn';
    else if(!ul) cl+='lk';
    else cl+='cur';
    const r=(CS.qr||{})[t.id];
    tw.innerHTML+=`<div class="tc ${cl}" ${ul?`onclick="openT('${t.id}')"`:''}>`+
      `<div class="tic ${t.cl}">${t.ic}</div>`+
      `<div class="ti">`+
        `<div class="tt">${t.t}</div>`+
        `<div class="td">${t.d}</div>`+
        `<div class="tm">`+
          `<span class="tg gx">+${t.xp} XP</span>`+
          `<span class="tg gq">10 Fragen</span>`+
          (dn&&r?`<span class="tg gd">${r.c}/${r.t} richtig</span>`:'')+
          (!ul?'<span class="tg gl">🔒 Gesperrt</span>':'')+
          (t.bon?'<span class="tg gb">★ Bonus</span>':'')+
        `</div>`+
      `</div>`+
      (dn?'<div class="tch">✅</div>':!ul?'<div class="tch">🔒</div>':'')+
    `</div>`;
  });
}

// ===== OPEN TOPIC =====
let topicStartTime=null;
function openT(id){
  curT=id; curPh='text'; curTL='easy'; curQI=0; qH=CS.hearts||MH; qC=0; selCh=-1; wrongAnswers=[];
  topicStartTime=Date.now();
  curQL=shuffle([...getQuiz(id)]);
  const t=TOPS.find(x=>x.id===id);
  document.getElementById('tTitle').textContent=t?t.t:'Thema';
  document.getElementById('tSub').textContent=t?t.d:'';
  setPhase('text');
  showSc('topicScreen');
}
function goMap(){
  if(curPh==='quiz'&&curQI>0&&!isTch){
    if(!confirm('Quiz abbrechen? Dein Fortschritt in diesem Durchgang geht verloren.')) return;
  }
  showSc('mapScreen');renderMap();
}

// ===== PHASE TABS =====
function setPhase(ph){
  curPh=ph;
  ['text','sim','quiz'].forEach(p=>document.getElementById('pt'+p.charAt(0).toUpperCase()+p.slice(1)).classList.toggle('active',p===ph));
  const pct=ph==='text'?33:ph==='sim'?66:100;
  document.getElementById('tProgFill').style.width=pct+'%';
  const b=document.getElementById('tBody');
  b.innerHTML='';
  if(ph==='text') renderText(b);
  else if(ph==='sim') renderSim(b);
  else renderQuiz(b);
}

// ===== TEXT PHASE =====
function renderText(b){
  const t=TOPS.find(x=>x.id===curT);
  const content=getTopicContent(curT);

  // Historical briefing (Platzhalter – wird in Teil 2 gefüllt)
  const hist=content?.hist;
  if(hist){
    b.innerHTML+=`<div class="hist-card"><div class="hist-year">📅 ${hist.year}</div><div class="hist-text">${hist.text}</div></div>`;
  } else {
    b.innerHTML+=`<div class="hist-card"><div class="hist-year">📅 Historisches Briefing</div><div class="hist-text">Das historische Briefing für dieses Thema wird in Teil 2 eingebaut.</div></div>`;
  }

  // Scenario
  const scene=content?.scene;
  if(scene){
    b.innerHTML+=`<div class="scene-card" data-icon="${scene.icon}"><div class="scene-role">❓ Einstieg</div><div class="scene-text">${scene.text}</div></div>`;
  } else {
    b.innerHTML+=`<div class="scene-card" data-icon="🔬"><div class="scene-role">❓ Einstieg</div><div class="scene-text">Das Einstiegsszenario für dieses Thema wird in Teil 2 eingebaut.</div></div>`;
  }

  // Text variant buttons
  b.innerHTML+=`<div class="lbtnrow"><button class="lbtn ${curTL==='easy'?'active':''}" onclick="setTL('easy')">💬 Einfache Sprache</button><button class="lbtn ${curTL==='orig'?'active':''}" onclick="setTL('orig')">📚 Schulbuchtext</button></div>`;
  b.innerHTML+=`<div id="tc2"></div>`;
  b.innerHTML+=`<button class="btn-weiter" onclick="setPhase('sim')">Weiter zur Simulation →</button>`;
  renderTC();
}
function setTL(l){
  curTL=l;
  document.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('active',i===(l==='easy'?0:1)));
  renderTC();
}
function renderTC(){
  const c=document.getElementById('tc2');
  if(!c) return;
  const content=getTopicContent(curT);
  const t=TOPS.find(x=>x.id===curT);
  if(content&&content[curTL]){
    c.innerHTML=content[curTL];
  } else {
    const lbl=curTL==='easy'?'Einfacher Text (vereinfacht)':'Schulbuchtext (Original Fokus Physik)';
    c.innerHTML=`<div class="txt-block"><h3>${lbl}</h3><p>Der Text für <strong>${t?t.t:curT}</strong> wird in Teil 2 eingebaut – direkt aus Fokus Physik (Cornelsen, NRW).</p><div class="bpr">📖 Text folgt in Teil 2</div></div>`;
  }
}

// ===== SIM PHASE =====
function renderSim(b){
  const sim=SIMS[curT];
  if(!sim){
    b.innerHTML=`<div class="sc"><div class="bph"><div style="font-size:48px;margin-bottom:12px">🔬</div><h3>Simulation</h3><p>Die interaktive Simulation folgt in den nächsten Teilen.</p><div class="bpr">⚙️ Simulation folgt</div></div></div><button class="btn-weiter" onclick="setPhase('quiz')">Weiter zum Quiz →</button>`;
    return;
  }
  if(curT==='strahlung'&&SIMS.strAbstand){
    b.innerHTML=
      `<div class="sc"><h3>${sim.title}</h3><div id="simMnt"></div></div>`+
      `<div class="sc" style="margin-top:12px"><h3>${SIMS.strAbstand.title}</h3><div id="simMnt2"></div></div>`+
      `<button class="btn-weiter" onclick="setPhase('quiz')">Weiter zum Quiz →</button>`;
    setTimeout(()=>{sim.init(document.getElementById('simMnt'));SIMS.strAbstand.init(document.getElementById('simMnt2'));},80);
    return;
  }
  b.innerHTML=`<div class="sc"><h3>${sim.title}</h3><div id="simMnt"></div></div><button class="btn-weiter" onclick="setPhase('quiz')">Weiter zum Quiz →</button>`;
  setTimeout(()=>sim.init(document.getElementById('simMnt')),80);
}

// ===== QUIZ PHASE =====
function renderQuiz(b){
  if(curQI>=curQL.length){showResults();return;}
  const q=curQL[curQI],tot=curQL.length,pct=Math.round(curQI/tot*100);
  b.innerHTML=`<div class="qhdr"><div class="qpg">Frage ${curQI+1}/${tot}</div><div class="qsc">✓ ${qC} richtig</div><div class="hq">${Array.from({length:MH},(_,i)=>`<span class="hrt-q${i<qH?'':' lost'}">❤️</span>`).join('')}</div></div>`+
    `<div class="qprog"><div class="qprog-f" style="width:${pct}%"></div></div>`+
    `<div class="qc">`+
      (q.context?`<div class="q-context">${q.context}</div>`:'')+
      `<div class="qn">Frage ${curQI+1}</div>`+
      `<div class="qq">${q.q}</div>`+
      `<div id="qIn"></div>`+
      `<div class="hb" id="hBox"><div class="ht">💡 Tipp</div>${q.hint}</div>`+
      `<div class="fb" id="fBox"></div>`+
    `</div>`+
    `<div class="qnv"><button class="bck" id="bCk" onclick="chkAns()">Antwort prüfen ✓</button><button class="bnx" id="bNx" onclick="nxtQ()">Nächste Frage →</button></div>`+
    `<button class="bhi" onclick="document.getElementById('hBox').classList.add('show')">💡 Tipp anzeigen</button>`;
  selCh=-1;
  if(q.type==='choice') buildCh(q);
  else buildGp(q);
}
function buildCh(q){
  document.getElementById('qIn').innerHTML=`<div class="chs">${q.choices.map((c,i)=>`<button class="ch" id="ch${i}" onclick="selC(${i})"><span class="ch-letter">${String.fromCharCode(65+i)}</span>${c}</button>`).join('')}</div>`;
}
function selC(i){selCh=i;document.querySelectorAll('.ch').forEach((c,j)=>c.classList.toggle('sl',j===i));}
function buildGp(q){
  let gi=0;
  const html=q.text.replace(/\[([^\]]+)\]/g,()=>`<input class="gi" id="g${gi++}" placeholder="?" autocomplete="off">`);
  document.getElementById('qIn').innerHTML=`<div class="gt">${html}</div>`;
}
function chkAns(){
  const q=curQL[curQI];let ok=false;
  if(q.type==='choice'){
    if(selCh<0){showToast('Wähle eine Antwort!');return;}
    ok=selCh===q.correct;
    document.querySelectorAll('.ch').forEach((c,i)=>{
      if(i===q.correct) c.classList.add('co');
      else if(i===selCh) c.classList.add('wr');
      c.disabled=true;
    });
  } else {
    const gaps=document.querySelectorAll('.gi');let all=true;
    gaps.forEach((g,i)=>{
      const v=g.value.trim().toLowerCase();
      const ex=(q.gaps[i]||'').toLowerCase();
      // Flexible matching: exact, multi-option (/), singular/plural, substring for long answers
      const accepted=ex.split('/').map(s=>s.trim());
      const flexMatch=(inp,acc)=>{
        if(acc.includes(inp)) return true;
        // Singular/Plural: akzeptiere mit/ohne abschließendes 'e','en','s','n'
        for(const a of acc){
          if(inp===a+'e'||inp+'e'===a) return true;
          if(inp===a+'en'||inp+'en'===a) return true;
          if(inp===a+'n'||inp+'n'===a) return true;
          if(inp===a+'s'||inp+'s'===a) return true;
          // Teilantwort: wenn Antwort lang (>6 Zeichen) und vollständig enthalten
          if(a.length>6&&a.includes(inp)&&inp.length>=4) return true;
          if(inp.length>6&&inp.includes(a)&&a.length>=4) return true;
        }
        return false;
      };
      const m=flexMatch(v,accepted);
      g.classList.toggle('gok',m);g.classList.toggle('gng',!m);
      if(!m){all=false;g.value=q.gaps[i];}
      g.readOnly=true;
    });
    ok=all;
  }
  const fb=document.getElementById('fBox');
  if(ok){
    qC++;
    fb.className='fb show fok';
    fb.innerHTML=`✅ Richtig!<div class="fbx">${q.explain}</div>`;
  } else {
    qH--;
    // Track wrong answer for review
    wrongAnswers.push({
      qi: curQI+1,
      q: q.q,
      context: q.context||'',
      correct: q.type==='choice' ? q.choices[q.correct] : q.gaps.join(', '),
      given: q.type==='choice' ? (selCh>=0?q.choices[selCh]:'–') : Array.from(document.querySelectorAll('.gi')).map(g=>g.value||'–').join(', '),
      explain: q.explain
    });
    fb.className='fb show fng';
    fb.innerHTML=`❌ Nicht ganz.<div class="fbx">${q.explain}</div>${q.hint?`<div class="fbx" style="color:var(--wnd);margin-top:4px">💡 Tipp: ${q.hint}</div>`:''}`;
    if(qH<=0){setTimeout(showFailed,1300);return;}
  }
  document.getElementById('bCk').style.display='none';
  document.getElementById('bNx').style.display='block';
  selCh=-1;
}
function nxtQ(){curQI++;renderQuiz(document.getElementById('tBody'));}

// ===== RESULTS =====
function showResults(){
  const t=TOPS.find(x=>x.id===curT),sc=qC/curQL.length;
  if(sc<PT&&!isTch){showFailed();return;}
  if(!CS.completed.includes(t.id)){
    CS.completed.push(t.id);
    CS.xp+=t.xp;
    if(t.bdg&&!CS.badges.includes(t.bdg)) CS.badges.push(t.bdg);
  }
  CS.hearts=Math.min(MH,CS.hearts+1);
  if(!CS.qr) CS.qr={};
  const lernzeit=topicStartTime?Math.round((Date.now()-topicStartTime)/1000/60):null;
  CS.qr[t.id]={c:qC,t:curQL.length,ts:Date.now(),min:lernzeit,ref:''};
  saveS(CS);
  const code=genCode(CS);
  const bdg=BDGS.find(b=>b.id===t.bdg);
  const em=sc===1?'🏆':sc>=0.9?'⭐':sc>=0.8?'✅':'👍';

  // Falschantworten-Review HTML
  let reviewHtml='';
  if(wrongAnswers.length>0){
    reviewHtml=`
    <div style="background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;border:1.5px solid rgba(255,69,96,0.2)">
      <div style="font-size:11px;font-weight:900;color:var(--er);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">❌ ${wrongAnswers.length} Frage${wrongAnswers.length>1?'n':''} nochmal anschauen</div>
      ${wrongAnswers.map((w,i)=>`
        <div style="margin-bottom:${i<wrongAnswers.length-1?'12px':'0'};padding-bottom:${i<wrongAnswers.length-1?'12px':'0'};border-bottom:${i<wrongAnswers.length-1?'1px solid var(--bd2)':'none'}">
          ${w.context?`<div style="font-size:10px;font-weight:800;color:var(--tx2);margin-bottom:3px">${w.context}</div>`:''}
          <div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:6px">${w.q}</div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <div style="font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;background:rgba(255,69,96,0.08);border:1px solid rgba(255,69,96,0.2);color:var(--er)">
              ✗ Deine Antwort: <em>${w.given}</em>
            </div>
            <div style="font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.2);color:var(--ok)">
              ✓ Richtig: <strong>${w.correct}</strong>
            </div>
          </div>
          <div style="font-size:11px;color:var(--tx2);font-weight:600;margin-top:5px;line-height:1.5">${w.explain}</div>
        </div>`).join('')}
    </div>`;
  }

  const lernzeitText=lernzeit!==null?`${lernzeit} Min.`:'–';

  document.getElementById('resBody').innerHTML=`
  <div class="rc">
    <span style="font-size:60px;display:block;margin-bottom:10px">${em}</span>
    <div class="rt">${t.t} gemeistert!</div>
    <div class="rs">${Math.round(sc*100)}% richtig</div>
    <div class="xpg">+${t.xp} XP ⚡</div>
    <div class="rst">
      <div class="stbx"><div class="stn">${qC}</div><div class="stl">Richtig</div></div>
      <div class="stbx"><div class="stn">${curQL.length-qC}</div><div class="stl">Fehler</div></div>
      <div class="stbx"><div class="stn">${Math.round(sc*100)}%</div><div class="stl">Ergebnis</div></div>
      <div class="stbx"><div class="stn">${lernzeitText}</div><div class="stl">Lernzeit</div></div>
    </div>
    ${bdg?`<div class="bw"><div class="bwi">${bdg.ic}</div><div class="bwt"><strong>Abzeichen: ${bdg.n}</strong><span>Freigeschaltet! 🎉</span></div></div>`:''}
  </div>
  ${reviewHtml}

  <!-- REFLEXIONSFRAGE -->
  <div style="background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;border:1.5px solid rgba(108,99,255,0.3)">
    <div style="font-size:11px;font-weight:900;color:var(--p2);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">💭 Kurze Reflexion</div>
    <div style="font-size:15px;font-weight:700;color:var(--tx);margin-bottom:12px">Was war neu oder überraschend für dich bei <em>${t.t}</em>?</div>
    <textarea id="refInput" rows="3" maxlength="300"
      style="width:100%;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--rs);padding:12px;color:var(--tx);font-family:inherit;font-size:14px;font-weight:600;resize:none;outline:none"
      placeholder="Schreib 1–2 Sätze..."></textarea>
    <button onclick="saveReflexion('${t.id}')"
      style="margin-top:10px;width:100%;padding:12px;background:var(--p);border:none;border-radius:var(--rs);color:#fff;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:0.5px">
      ✅ Antwort speichern
    </button>
    <div id="refSaved" style="display:none;margin-top:8px;font-size:13px;font-weight:700;color:var(--ok);text-align:center">Gespeichert ✓</div>
  </div>

  <!-- MOODLE ABGABE -->
  <div class="cbox" id="moodleBox">
    <div class="cbt">📤 Abgabe für die Lehrkraft</div>
    <p style="font-size:12px;font-weight:700;color:var(--wnd);margin-bottom:8px">PDF herunterladen und in Moodle hochladen:</p>
    <div class="cstr" id="moodleText" style="font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all">${buildMoodleText(t,sc,qC,curQL.length,lernzeit,'')}</div>
    <button class="cpb" onclick="exportPDF('${t.id}')" style="background:var(--ok);margin-bottom:8px">📄 PDF herunterladen</button>
    <button class="cpb" onclick="copyMoodle()">📋 Text kopieren</button>
  </div>

  <div class="cbox">
    <div class="cbt">🔑 Fortsetzungscode für die nächste Stunde</div>
    <p style="font-size:12px;font-weight:700;color:var(--wnd);margin-bottom:8px">Screenshot machen oder Code abschreiben!</p>
    <div class="cstr" id="codeDisp">${code}</div>
    <div class="chi">📸 Tipp: Screenshot machen oder Code abschreiben</div>
    <button class="cpb" onclick="copyCode()">📋 Code kopieren</button>
  </div>
  <button class="bco" onclick="goMap()">Zur Lernkarte →</button>
  <button class="brp" onclick="openT('${t.id}')">🔄 Thema wiederholen</button>`;
  showSc('resultScreen');
  setTimeout(()=>showXpP(t.xp),500);
}
function copyCode(){
  const el=document.getElementById('codeDisp');
  if(!el) return;
  const code=el.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(code).then(()=>showToast('✅ Code kopiert!'));}
  else{
    try{const s=window.getSelection(),r=document.createRange();r.selectNodeContents(el);s.removeAllRanges();s.addRange(r);document.execCommand('copy');s.removeAllRanges();showToast('✅ Code kopiert!');}
    catch(e){showToast('Bitte Code manuell kopieren!');}
  }
}
function buildMoodleText(t,sc,richtig,gesamt,lernzeit,reflexion){
  const jetzt=new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const lzText=lernzeit!==null?`${lernzeit} Min.`:'–';
  return `📋 LERNFORTSCHRITT – ${jetzt}
Name: ${CS.name}
Thema: ${t.t}
Ergebnis: ${richtig}/${gesamt} richtig (${Math.round(sc*100)}%)
Lernzeit: ${lzText}
Gesamt-XP: ${CS.xp}
Abgeschlossene Themen: ${CS.completed.length}

💭 Reflexion: ${reflexion||'(noch nicht ausgefüllt)'}`;
}
function saveReflexion(topicId){
  const inp=document.getElementById('refInput');
  if(!inp) return;
  const ref=inp.value.trim();
  if(!ref){showToast('Bitte erst etwas schreiben!');return;}
  if(!CS.qr) CS.qr={};
  if(CS.qr[topicId]) CS.qr[topicId].ref=ref;
  saveS(CS);
  // Moodle-Text aktualisieren
  const t=TOPS.find(x=>x.id===topicId);
  const sc=CS.qr[topicId]?CS.qr[topicId].c/CS.qr[topicId].t:0;
  const richtig=CS.qr[topicId]?.c||0;
  const gesamt=CS.qr[topicId]?.t||10;
  const lernzeit=CS.qr[topicId]?.min||null;
  const moodleEl=document.getElementById('moodleText');
  if(moodleEl) moodleEl.textContent=buildMoodleText(t,sc,richtig,gesamt,lernzeit,ref);
  const saved=document.getElementById('refSaved');
  if(saved) saved.style.display='block';
  inp.readOnly=true;
  showToast('✅ Reflexion gespeichert!');
}
function copyMoodle(){
  const el=document.getElementById('moodleText');
  if(!el) return;
  const text=el.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('✅ Moodle-Text kopiert!'));}
  else{
    try{const s=window.getSelection(),r=document.createRange();r.selectNodeContents(el);s.removeAllRanges();s.addRange(r);document.execCommand('copy');s.removeAllRanges();showToast('✅ Kopiert!');}
    catch(e){showToast('Bitte Text manuell kopieren!');}
  }
}
function exportPDF(topicId){
  if(isTch){showToast('ℹ️ PDF nur für Schüler verfügbar');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const t=TOPS.find(x=>x.id===topicId);
    const qr=CS.qr&&CS.qr[topicId]?CS.qr[topicId]:{};
    const sc=qr.c!=null&&qr.t?qr.c/qr.t:0;
    const richtig=qr.c||0;
    const gesamt=qr.t||10;
    const lernzeit=qr.min!=null?`${qr.min} Min.`:'–';
    const ref=qr.ref||'(keine Reflexion eingetragen)';
    const jetzt=new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const abgeschlossen=CS.completed||[];
    const gesamtXP=CS.xp||0;

    // ── Farben & Hilfsfunktionen ──
    const lila=[108,99,255];
    const dunkel=[13,15,26];
    const grau=[60,65,100];
    const weiss=[232,234,246];
    const gruen=[0,212,170];
    const gelb=[255,159,28];

    const W=210,M=14;
    let y=0;

    // Header-Balken
    doc.setFillColor(...dunkel);
    doc.rect(0,0,W,38,'F');
    doc.setFillColor(...lila);
    doc.rect(0,0,4,38,'F');

    doc.setTextColor(...weiss);
    doc.setFont('helvetica','bold');
    doc.setFontSize(20);
    doc.text('☢ RADIOAKTIV – Lernbericht',M,14);

    doc.setFontSize(9);
    doc.setTextColor(...[155,160,196]);
    doc.text(`Klasse 9/10 · Physik · IF10: Ionisierende Strahlung`,M,22);
    doc.text(`Erstellt: ${jetzt}`,M,29);

    // Schülername rechts oben
    doc.setFontSize(13);
    doc.setTextColor(...lila);
    doc.setFont('helvetica','bold');
    doc.text(CS.name,W-M,14,{align:'right'});
    doc.setFontSize(9);
    doc.setTextColor(...[155,160,196]);
    doc.text(`${gesamtXP} XP · ${abgeschlossen.length} Themen abgeschlossen`,W-M,22,{align:'right'});

    y=48;

    // ── Abschnitt 1: Aktuelles Thema ──
    doc.setFillColor(...[28,31,53]);
    doc.roundedRect(M,y,W-2*M,52,3,3,'F');
    doc.setDrawColor(...lila);
    doc.setLineWidth(0.5);
    doc.roundedRect(M,y,W-2*M,52,3,3,'S');

    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...lila);
    doc.text('AKTUELLES THEMA',M+6,y+8);

    doc.setFontSize(14);
    doc.setTextColor(...weiss);
    doc.text(`${t?t.ic+' '+t.t:'–'}`,M+6,y+18);

    doc.setFontSize(9);
    doc.setTextColor(...[155,160,196]);
    doc.text(t?t.d:'',M+6,y+26);

    // Ergebnis-Kacheln
    const kacheln=[
      {l:'Richtig',v:`${richtig}/${gesamt}`},
      {l:'Score',v:`${Math.round(sc*100)}%`},
      {l:'Lernzeit',v:lernzeit},
      {l:'Gesamt-XP',v:`${gesamtXP}`},
    ];
    const kW=(W-2*M-12)/4;
    kacheln.forEach((k,i)=>{
      const kx=M+6+i*(kW+4);
      const ky=y+32;
      doc.setFillColor(...dunkel);
      doc.roundedRect(kx,ky,kW,14,2,2,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.setTextColor(...(sc>=0.8?gruen:gelb));
      doc.text(k.v,kx+kW/2,ky+8,{align:'center'});
      doc.setFontSize(7);
      doc.setTextColor(...grau);
      doc.text(k.l,kx+kW/2,ky+13,{align:'center'});
    });
    y+=60;

    // ── Abschnitt 2: Fortschritt alle Themen ──
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...lila);
    doc.text('LERNFORTSCHRITT – ALLE THEMEN',M,y+5);
    y+=10;

    const pflicht=TOPS.filter(tp=>!tp.bon);
    const bonus=TOPS.filter(tp=>tp.bon);
    const zeigeThemen=(liste,label)=>{
      doc.setFont('helvetica','bold');
      doc.setFontSize(7);
      doc.setTextColor(...grau);
      doc.text(label,M,y);
      y+=5;
      liste.forEach(tp=>{
        const done=abgeschlossen.includes(tp.id);
        const tqr=CS.qr&&CS.qr[tp.id];
        doc.setFillColor(...(done?[0,40,34]:[28,31,53]));
        doc.roundedRect(M,y,W-2*M,9,2,2,'F');
        if(done){
          doc.setDrawColor(...gruen);
          doc.setLineWidth(0.3);
          doc.roundedRect(M,y,W-2*M,9,2,2,'S');
        }
        // Icon + Name
        doc.setFont('helvetica','bold');
        doc.setFontSize(8);
        doc.setTextColor(...(done?gruen:grau));
        doc.text(`${done?'✓':'○'} ${tp.t}`,M+3,y+6);
        // Score rechts
        if(done&&tqr){
          doc.setTextColor(...gruen);
          doc.text(`${tqr.c}/${tqr.t} richtig · ${tqr.min!=null?tqr.min+' Min.':''}`,W-M-3,y+6,{align:'right'});
        } else if(!done){
          doc.setTextColor(...grau);
          doc.text('noch offen',W-M-3,y+6,{align:'right'});
        }
        y+=11;
        if(y>270){doc.addPage();y=15;}
      });
      y+=3;
    };

    zeigeThemen(pflicht,'📚 Pflichtthemen');
    if(bonus.length) zeigeThemen(bonus,'⭐ Bonusthemen');

    // ── Abschnitt 3: Reflexionen ──
    if(y>240){doc.addPage();y=15;}
    doc.setFillColor(...[28,31,53]);
    doc.roundedRect(M,y,W-2*M,8,2,2,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...lila);
    doc.text('💭 REFLEXIONEN DER SCHÜLERIN / DES SCHÜLERS',M+3,y+5.5);
    y+=12;

    const alleRef=TOPS.filter(tp=>CS.qr&&CS.qr[tp.id]&&CS.qr[tp.id].ref);
    if(alleRef.length===0){
      doc.setFont('helvetica','italic');
      doc.setFontSize(9);
      doc.setTextColor(...grau);
      doc.text('Keine Reflexionen vorhanden.',M,y+5);
      y+=12;
    } else {
      alleRef.forEach(tp=>{
        if(y>265){doc.addPage();y=15;}
        const refText=CS.qr[tp.id].ref;
        doc.setFont('helvetica','bold');
        doc.setFontSize(8);
        doc.setTextColor(...weiss);
        doc.text(`${tp.t}:`,M,y+5);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(...[155,160,196]);
        const lines=doc.splitTextToSize(refText,W-2*M-6);
        doc.text(lines,M+3,y+12);
        y+=12+lines.length*5+4;
      });
    }

    // ── Falsche Antworten aus aktuellem Quiz ──
    if(wrongAnswers&&wrongAnswers.length>0){
      if(y>230){doc.addPage();y=15;}
      doc.setFillColor(...[40,15,20]);
      doc.roundedRect(M,y,W-2*M,8,2,2,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(255,69,96);
      doc.text(`❌ FEHLKONZEPTE – ${t?t.t:''} (${wrongAnswers.length} Fehler)`,M+3,y+5.5);
      y+=12;
      wrongAnswers.forEach((w,i)=>{
        if(y>255){doc.addPage();y=15;}
        doc.setFont('helvetica','bold');
        doc.setFontSize(7);
        doc.setTextColor(...weiss);
        const qlines=doc.splitTextToSize(`F${i+1}: ${w.q}`,W-2*M-3);
        doc.text(qlines,M,y);
        y+=qlines.length*4+2;
        doc.setFont('helvetica','normal');
        doc.setFontSize(7);
        doc.setTextColor(255,100,120);
        doc.text(`✗ Gegeben: ${w.given}`,M+3,y);
        y+=4;
        doc.setTextColor(...gruen);
        doc.text(`✓ Richtig: ${w.correct}`,M+3,y);
        y+=4;
        doc.setTextColor(...grau);
        const exlines=doc.splitTextToSize(w.explain,W-2*M-6);
        doc.text(exlines,M+3,y);
        y+=exlines.length*4+5;
      });
    }

    // ── Footer ──
    const pages=doc.getNumberOfPages();
    for(let p=1;p<=pages;p++){
      doc.setPage(p);
      doc.setFillColor(...dunkel);
      doc.rect(0,287,W,10,'F');
      doc.setFont('helvetica','normal');
      doc.setFontSize(7);
      doc.setTextColor(...grau);
      doc.text(`Radioaktiv – Lernmission · ${CS.name} · Seite ${p}/${pages}`,W/2,293,{align:'center'});
    }

    const dateiname=`Radioaktiv_${CS.name.replace(/\s+/g,'_')}_${topicId}.pdf`;
    doc.save(dateiname);
    showToast('✅ PDF gespeichert!');
  } catch(e){
    console.error(e);
    showToast('❌ PDF-Fehler: '+e.message);
  }
}

function restartQ(){curQI=0;qH=MH;qC=0;selCh=-1;wrongAnswers=[];curQL=shuffle([...getQuiz(curT)]);showSc('topicScreen');setPhase('quiz');}

// ===== TEACHER =====
function openTeacher(){renderTeacher();showSc('teacherScreen');}
function renderTeacher(){
  const all=loadAll(),ss=Object.values(all);
  let html='';
  if(!ss.length){html='<div class="scard"><p style="color:var(--tx2);font-size:14px">Noch keine Schüler registriert.</p></div>';}
  else {
    ss.sort((a,b)=>b.xp-a.xp).forEach(s=>{
      const dn=(s.completed||[]).filter(id=>!TOPS.find(t=>t.id===id)?.bon);
      const lv=getLvl(s.xp),li=LVLS.indexOf(lv);
      const pills=TOPS.filter(t=>!t.bon).map(t=>{
        const r=(s.qr||{})[t.id],d=(s.completed||[]).includes(t.id);
        return `<span class="pl ${d?'pok':'pno'}">${t.t.split(' ')[0]}${d&&r?` ${r.c}/${r.t}`:''}</span>`;
      }).join('');
      html+=`<div class="scard"><div class="sname">${lv.e} ${s.name}</div><div class="slv">Level ${li+1} · ${lv.n} · ${s.xp} XP · ${dn.length}/${TOPS.filter(t=>!t.bon).length} Themen</div><div class="spills">${pills}</div></div>`;
    });
  }
  html+=`<button class="exp-btn" onclick="exportData()">📊 Daten exportieren</button>`;
  document.getElementById('teachBody').innerHTML=html;
}
function exportData(){
  const all=loadAll();
  const rows=[['Name','XP','Level','Abgeschlossen','Abzeichen']];
  Object.values(all).forEach(s=>{
    const lv=getLvl(s.xp),li=LVLS.indexOf(lv);
    rows.push([s.name,s.xp,`Level ${li+1} ${lv.n}`,(s.completed||[]).length,(s.badges||[]).length]);
  });
  const csv=rows.map(r=>r.join(';')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='radioaktiv-klasse.csv';
  a.click();
  showToast('📊 Export gestartet!');
}

function showXpP(xp){

  p.classList.add('show');
  setTimeout(()=>p.classList.remove('show'),2000);

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ===== PARTICLES =====
function initParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<15;i++){
    const p=document.createElement('div');
    p.className='pt';
    const sz=Math.random()*8+3;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;`+
      `background:${['#6c63ff','#ff4d8d','#00d4aa','#ffb703'][Math.floor(Math.random()*4)]};`+
      `animation-duration:${Math.random()*15+10}s;animation-delay:-${Math.random()*15}s;`;
    c.appendChild(p);
  }
}
